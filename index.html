<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIZHAR COMPUTER | MASTER POS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --bg: #f3f4f6; --card: #ffffff; --text: #111827; --primary: #2563eb; --border: #d1d5db; --success: #10b981; --danger: #ef4444;
        }

        body.dark-mode {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #3b82f6; --border: #334155; --success: #34d399;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }

        header { 
            background: var(--card); height: 70px; padding: 0 10px; border-bottom: 3px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
        }

        .brand { font-weight: 900; font-size: 14px; color: var(--primary); letter-spacing: 0.5px; }

        .btn-tool { 
            padding: 8px; border-radius: 10px; border: 1px solid var(--border); 
            background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px;
        }

        .container { max-width: 1400px; margin: 15px auto; padding: 0 10px; display: flex; flex-direction: column; gap: 15px; }
        .container.pc-mode { display: grid; grid-template-columns: 360px 1fr; }

        .card { background: var(--card); padding: 18px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        input, select { 
            width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; 
            background: var(--bg); color: var(--text); font-size: 14px; margin-top: 5px; outline: none;
        }

        .main-btn { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 900; 
            background: var(--primary); color: white; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-box { background: var(--card); padding: 12px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--primary); }
        .stat-box h3 { font-size: 18px; color: var(--primary); margin-top: 5px; }

        .table-wrap { background: var(--card); border-radius: 15px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
        th, td { padding: 12px; text-align: inherit; border-bottom: 1px solid var(--border); }

        #scanner { width: 100%; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 10px; border: 2px solid var(--primary); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 15px; }

        .result-box { background: var(--bg); padding: 12px; border-radius: 15px; text-align: center; margin-top: 10px; border: 1px solid var(--border); }
    </style>
</head>
<body id="app-body">

<header>
    <div class="brand">BIZHAR COMPUTER</div>
    <div style="display: flex; gap: 5px; align-items: center;">
        <button class="btn-tool" onclick="toggleLayout()"><i class="fa-solid fa-desktop"></i></button>
        <button class="btn-tool" onclick="document.getElementById('modal-inv').style.display='flex'"><i class="fa-solid fa-plus"></i></button>
        <button class="btn-tool" onclick="toggleDark()"><i id="dark-icon" class="fa-solid fa-moon"></i></button>
        <select id="lang-sel" class="btn-tool" onchange="applyLang()" style="width: 75px; font-weight: bold;">
            <option value="ku">Kurdî</option><option value="ar">عربي</option><option value="fa">فارسی</option><option value="tr">Türkçe</option><option value="en">English</option>
        </select>
    </div>
</header>

<div class="container" id="app-container">
    <div class="sidebar">
        <div class="card">
            <h3 id="t-form" style="margin-bottom:10px; font-weight:900;">تۆمارکرن</h3>
            <div id="scanner"></div>
            
            <label id="l-name" style="font-size:12px; font-weight:700;">ناڤێ کڕیاری</label>
            <input type="text" id="i-name" placeholder="...">

            <label id="l-item" style="font-size:12px; font-weight:700; margin-top:10px; display:block;">ئامێر</label>
            <div style="display:flex; gap:5px;">
                <select id="i-item"></select>
                <button onclick="startScan()" class="btn-tool" style="background:var(--primary); color:white;"><i class="fa-solid fa-barcode"></i></button>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                <div><label id="l-buy" style="font-size:11px;">کڕین $</label><input type="number" id="i-buy" oninput="calc()"></div>
                <div><label id="l-down" style="font-size:11px;">پێشەکی $</label><input type="number" id="i-down" oninput="calc()"></div>
            </div>

            <label id="l-duration" style="font-size:12px; font-weight:700; margin-top:10px; display:block;">ماوێ قیستێ (هەیڤ)</label>
            <select id="i-months" onchange="calc()">
                <option value="6">6 Months (40%)</option>
                <option value="8">8 Months (45%)</option>
                <option value="10">10 Months (50%)</option>
                <option value="12">12 Months (55%)</option>
                <option value="14">14 Months (60%)</option>
                <option value="16">16 Months (75%)</option>
            </select>

            <div class="result-box">
                <small id="l-total-price">بهایێ گشتی (Total)</small>
                <div id="o-total" style="font-weight:900; color:var(--success); font-size:20px;">$ 0.00</div>
            </div>

            <div class="result-box" style="border: 2px dashed var(--primary);">
                <small id="l-mon">قیستێ هەیڤانە</small>
                <div id="o-mon" style="font-weight:900; color:var(--primary); font-size:24px;">$ 0.00</div>
            </div>

            <button class="main-btn" onclick="saveSale()"><i class="fa-solid fa-check-double"></i> <span id="b-save">پاشکەفتکرن</span></button>
        </div>
    </div>

    <div class="main-content">
        <div class="stats">
            <div class="stat-box"><small id="s1">مەخزەن</small><h3 id="v1">0</h3></div>
            <div class="stat-box"><small id="s2">کڕیار</small><h3 id="v2">0</h3></div>
            <div class="stat-box"><small id="s3">قەرز</small><h3 id="v3">0$</h3></div>
            <div class="stat-box" style="border-color:var(--success)"><small id="s4">قازانج</small><h3 id="v4" style="color:var(--success)">0$</h3></div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th id="th1">کڕیار</th><th id="th2">ئامێر</th><th id="th3">گشتی</th><th id="th4">کردار</th></tr>
                </thead>
                <tbody id="sales-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal" id="modal-inv">
    <div class="card" style="width:100%; max-width:400px;">
        <h3 id="m-title" style="margin-bottom:15px;">زێدەکرنا ئامێری</h3>
        <input type="text" id="add-name" placeholder="...">
        <input type="text" id="add-barcode" placeholder="Barcode">
        <input type="number" id="add-qty" placeholder="Qty">
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="main-btn" id="m-add" onclick="addInv()" style="background:var(--success); margin:0;">زێدە بکە</button>
            <button class="main-btn" id="m-close" onclick="document.getElementById('modal-inv').style.display='none'" style="background:#64748b; margin:0;">داخستن</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bizhar-pos-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let inv = [], sales = [];

    const langs = {
        ku: { dir: "rtl", tform: "تۆمارکرن", lname: "ناڤێ کڕیاری", litem: "ئامێر", lbuy: "کڕین $", ldown: "پێشەکی $", lduration: "ماوێ قیستێ", lmon: "قیستێ هەیڤانە", bsave: "پاشکەفتکرن", s1: "مەخزەن", s2: "کڕیار", s3: "قەرز", s4: "قازانج", th1: "کڕیار", th2: "ئامێر", th3: "گشتی", th4: "کردار", mtitle: "زێدەکرنا ئامێری", madd: "زێدە بکە", mclose: "داخستن", ltotal: "بهایێ گشتی" },
        // ... (other languages can be filled similarly)
    };

    function applyLang() {
        const val = document.getElementById('lang-sel').value;
        const l = langs[val] || langs.ku;
        document.body.dir = l.dir;
        document.getElementById('t-form').innerText = l.tform;
        document.getElementById('l-name').innerText = l.lname;
        document.getElementById('l-item').innerText = l.litem;
        document.getElementById('l-buy').innerText = l.lbuy;
        document.getElementById('l-down').innerText = l.ldown;
        document.getElementById('l-duration').innerText = l.lduration;
        document.getElementById('l-mon').innerText = l.lmon;
        document.getElementById('b-save').innerText = l.bsave;
        document.getElementById('s1').innerText = l.s1;
        document.getElementById('s2').innerText = l.s2;
        document.getElementById('s3').innerText = l.s3;
        document.getElementById('s4').innerText = l.s4;
        document.getElementById('th1').innerText = l.th1;
        document.getElementById('th2').innerText = l.th2;
        document.getElementById('th3').innerText = l.th3;
        document.getElementById('th4').innerText = l.th4;
        document.getElementById('m-title').innerText = l.mtitle;
        document.getElementById('m-add').innerText = l.madd;
        document.getElementById('m-close').innerText = l.mclose;
        document.getElementById('l-total-price').innerText = l.ltotal;
    }

    function toggleLayout() { document.getElementById('app-container').classList.toggle('pc-mode'); }
    function toggleDark() { 
        document.body.classList.toggle('dark-mode'); 
        document.getElementById('dark-icon').className = document.body.classList.contains('dark-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }

    db.ref('/').on('value', snap => { const d = snap.val(); if(d){ inv=d.i||[]; sales=d.s||[]; render(); } });

    function calc() {
        let b = parseFloat(document.getElementById('i-buy').value)||0, d = parseFloat(document.getElementById('i-down').value)||0;
        let m = parseInt(document.getElementById('i-months').value);
        
        // Custom Formula Implementation
        let rate = 0;
        if(m === 6) rate = 0.40;
        else if(m === 8) rate = 0.45;
        else if(m === 10) rate = 0.50;
        else if(m === 12) rate = 0.55;
        else if(m === 14) rate = 0.60;
        else if(m === 16) rate = 0.75;

        let profitAmount = b * rate;
        let total = b + profitAmount; // ئەنجامێ دوماهیکێ کامل
        let mon = (total - d) / m;

        document.getElementById('o-total').innerText = "$ " + total.toFixed(2);
        document.getElementById('o-mon').innerText = "$ " + mon.toFixed(2);
        return { total, mon, b, d, m };
    }

    function saveSale() {
        let n = document.getElementById('i-name').value, i = document.getElementById('i-item').value;
        if(!n || !i) return alert("Fill all fields!");
        let p = calc();
        let idx = inv.findIndex(x => x.name === i);
        if(idx !== -1) inv[idx].qty--;
        sales.unshift({ id:Date.now(), name:n, item:i, total:p.total.toFixed(2), buy:p.b, down:p.d, mon:p.mon.toFixed(2), months:p.m, paid:0, date:new Date().toLocaleDateString() });
        db.ref('/').set({ i: inv, s: sales });
        document.getElementById('i-name').value = "";
    }

    function addInv() {
        let n = document.getElementById('add-name').value, b = document.getElementById('add-barcode').value, q = parseInt(document.getElementById('add-qty').value);
        if(n && q){ inv.push({name:n, barcode:b, qty:q}); db.ref('/').set({i:inv, s:sales}); document.getElementById('modal-inv').style.display='none'; }
    }

    function render() {
        document.getElementById('v1').innerText = inv.reduce((a,b)=>a+b.qty,0);
        document.getElementById('v2').innerText = sales.length;
        let dbt=0, pro=0;
        sales.forEach(s => { 
            dbt += (parseFloat(s.total) - parseFloat(s.down) - (s.paid*parseFloat(s.mon))); 
            pro += (parseFloat(s.total) - parseFloat(s.buy));
        });
        document.getElementById('v3').innerText = dbt.toFixed(1) + "$";
        document.getElementById('v4').innerText = pro.toFixed(1) + "$";

        let sel = document.getElementById('i-item'), list = document.getElementById('sales-list');
        sel.innerHTML = '<option value="">...</option>';
        inv.forEach(x => { if(x.qty>0) sel.innerHTML += `<option value="${x.name}">${x.name} (${x.qty})</option>`; });
        
        list.innerHTML = '';
        sales.forEach(s => {
            list.innerHTML += `<tr>
                <td><b>${s.name}</b></td>
                <td>${s.item}</td>
                <td>${s.total}$</td>
                <td>
                    <button class="btn-tool" onclick="pay(${s.id})"><i class="fa-solid fa-plus"></i></button>
                    <button class="btn-tool" style="color:var(--danger)" onclick="deleteSale(${s.id})"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        });
    }

    function pay(id) { 
        let s=sales.find(x=>x.id===id); 
        if(s.paid < s.months){ s.paid++; db.ref('/').set({i:inv, s:sales}); } 
        else { alert("Paid Off!"); }
    }

    function deleteSale(id) {
        if(confirm("Dێ ئەڤێ تۆمارێ سڕی؟")){
            sales = sales.filter(x => x.id !== id);
            db.ref('/').set({ i: inv, s: sales });
        }
    }

    function startScan() {
        document.getElementById('scanner').style.display = 'block';
        let sc = new Html5QrcodeScanner("scanner", { fps: 15, qrbox: 250 });
        sc.render((txt) => {
            let f = inv.find(x => x.barcode === txt || x.name === txt);
            if(f) { document.getElementById('i-item').value = f.name; sc.clear(); document.getElementById('scanner').style.display='none'; }
        });
    }
    applyLang();
</script>
</body>
</html>
