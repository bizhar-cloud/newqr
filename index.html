<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIZHAR POS | Cloud Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Orbitron:wght@600;800&display=swap');
        :root { --primary: #00f2ff; --success: #00ff88; --danger: #ff3366; --dark: #03050a; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; transition: 0.3s ease; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--dark); color: #e0e0e0; margin: 0; min-height: 100vh; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 320px; background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border-left: 1px solid rgba(255,255,255,0.08); padding: 20px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
        .main-content { flex: 1; padding: 25px; }
        .brand { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--primary); text-align: center; margin-bottom: 25px; text-shadow: 0 0 10px rgba(0,242,255,0.4); }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-backup-hub { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
        .backup-menu { display: none; background: rgba(0,0,0,0.8); border-radius: 12px; padding: 10px; border: 1px solid var(--success); margin-bottom: 15px; }
        .menu-item { padding: 10px; cursor: pointer; border-radius: 8px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { background: rgba(0,255,136,0.1); color: var(--success); }
        .stat-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-item { background: var(--glass); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.08); text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; text-align: right; font-size: 12px; opacity: 0.6; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 13px; }
        .sync-status { font-size: 10px; text-align: center; margin-bottom: 10px; color: var(--success); }
        @media (max-width: 1000px) { .app-container { flex-direction: column; } .sidebar { width: 100%; height: auto; } .stat-box { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="brand">BIZHAR COMPUTER</div>
        <div class="sync-status" id="sync-icon"><i class="fa-solid fa-cloud"></i> داتابەیس یا گرێدایە</div>
        
        <div class="card">
            <h4 style="margin:0 0 10px 0; color:var(--primary)">فرۆشتنا نوو</h4>
            <input type="text" id="c-name" placeholder="ناڤێ کڕیاری">
            <select id="item-select"></select>
            <div style="display:flex; gap:8px;">
                <input type="number" id="cost-in" placeholder="کڕین $" oninput="recalc()">
                <input type="number" id="down-in" placeholder="پێشەکی $" oninput="recalc()">
            </div>
            <select id="months-in" onchange="recalc()">
                <option value="6">6 هەیڤ (38%)</option><option value="8">8 هەیڤ (45%)</option>
                <option value="10">10 هەیڤ (48%)</option><option value="12">12 هەیڤ (56%)</option>
                <option value="14">14 هەیڤ (64%)</option><option value="16">16 هەیڤ (75%)</option>
            </select>
            <div style="padding:10px; background:rgba(0,0,0,0.3); border-radius:10px; border-right:3px solid var(--primary); margin-bottom:12px;">
                هەیڤانە: <b id="out-monthly" style="color:var(--primary)">0 $</b>
            </div>
            <button class="btn btn-primary" onclick="addSale()">تۆمارکرن</button>
        </div>

        <button class="btn btn-backup-hub" onclick="checkPassword()">
            <i class="fa-solid fa-lock"></i> باکئاپ و پاراستن
        </button>
        <div id="backup-menu" class="backup-menu">
            <div class="menu-item" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> هەناردە بۆ Excel</div>
            <div class="menu-item" onclick="confirmReset()"><i class="fa-solid fa-trash"></i> رەشکرنا هەمی داتایان</div>
        </div>

        <div class="card">
            <h4 style="margin:0 0 10px 0;">مەخزەن</h4>
            <input type="text" id="st-name" placeholder="ئامێر">
            <input type="number" id="st-qty" placeholder="عدەد">
            <button class="btn" style="background:rgba(255,255,255,0.05); color:#fff;" onclick="addStock()">زێدەکرن</button>
        </div>
    </div>

    <div class="main-content">
        <div class="stat-box">
            <div class="stat-item"><span>مەخزەن</span><b id="s-inv">0</b></div>
            <div class="stat-item"><span>کڕیار</span><b id="s-cust">0</b></div>
            <div class="stat-item"><span>قەرز</span><b id="s-debt">0 $</b></div>
            <div class="stat-item"><span>داهات</span><b id="s-income">0 $</b></div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0">لیستا قیستان (Live)</h3>
                <input type="text" id="search" placeholder="گەڕیان..." onkeyup="ui()" style="width:250px; margin:0;">
            </div>
            <table>
                <thead><tr><th>کڕیار</th><th>ئامێر</th><th>گشتی</th><th>هەیڤانە</th><th>باقی</th><th>کردار</th></tr></thead>
                <tbody id="log-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    // تێبینی: من ناڤێ پڕۆژێ تە دانا، هەکە لینك جودا بوو، دێ ب تنێ DatabaseURL گوهۆڕی
    const firebaseConfig = {
        databaseURL: "https://bizhar-pos-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ADMIN_PASS = "1234";
    let inv = [], sales = [];

    // --- DATA SYNC ---
    // خواندنا داتایان ژ فایربەیس (هەر گوهۆڕینەك دێ ئێكسەر ل ڤێرە دیار بیت)
    db.ref('/').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            inv = data.inventory || [];
            sales = data.sales || [];
            ui();
        }
    });

    function checkPassword() {
        let m = document.getElementById('backup-menu');
        if(m.style.display === 'block') { m.style.display = 'none'; return; }
        let entry = prompt("پاسۆرد:");
        if(entry === ADMIN_PASS) m.style.display = 'block';
    }

    function recalc() {
        let c = parseFloat(document.getElementById('cost-in').value) || 0, 
            d = parseFloat(document.getElementById('down-in').value) || 0, 
            m = parseInt(document.getElementById('months-in').value);
        let r = {6:0.38, 8:0.45, 10:0.48, 12:0.56, 14:0.64, 16:0.75}[m];
        let total = c + (c * r), monthly = (total - d) / m;
        document.getElementById('out-monthly').innerText = monthly.toFixed(2) + " $";
        return { total, monthly, d, m };
    }

    function addSale() {
        let n = document.getElementById('c-name').value, i = document.getElementById('item-select').value;
        if(!n || !i) return alert("خانەیان پڕ بکە");
        let p = recalc();
        let itemIndex = inv.findIndex(x => x.name === i);
        if(inv[itemIndex].qty > 0) {
            inv[itemIndex].qty--;
            sales.unshift({ id:Date.now(), name:n, item:i, total:p.total.toFixed(2), down:p.d.toFixed(2), monthly:p.monthly.toFixed(2), months:p.m, paid:0, date:new Date().toLocaleString('ku-IQ') });
            sync();
            document.getElementById('c-name').value = "";
        }
    }

    function addStock() {
        let n = document.getElementById('st-name').value, q = parseInt(document.getElementById('st-qty').value);
        if(n && q) {
            let f = inv.find(x=>x.name===n);
            if(f) f.qty+=q; else inv.push({name:n, qty:q});
            sync();
            document.getElementById('st-name').value = ""; document.getElementById('st-qty').value = "";
        }
    }

    function pay(id) {
        let s = sales.find(x => x.id === id);
        if(s.paid < s.months) { s.paid++; sync(); }
    }

    function sync() {
        // ناردنا داتایان بۆ فایربەیس
        db.ref('/').set({ inventory: inv, sales: sales });
    }

    function ui() {
        document.getElementById('s-inv').innerText = inv.reduce((a, b) => a + b.qty, 0);
        document.getElementById('s-cust').innerText = sales.length;
        let dbt = 0, inc = 0;
        sales.forEach(s => { let p_val = parseFloat(s.down) + (s.paid * parseFloat(s.monthly)); inc += p_val; dbt += (parseFloat(s.total) - p_val); });
        document.getElementById('s-debt').innerText = dbt.toFixed(2) + " $";
        document.getElementById('s-income').innerText = inc.toFixed(2) + " $";
        
        let sel = document.getElementById('item-select'), list = document.getElementById('log-list');
        sel.innerHTML = '<option value="">ئامێری هەلبژێرە...</option>';
        inv.forEach(x => { if(x.qty > 0) sel.innerHTML += `<option value="${x.name}">${x.name} (${x.qty})</option>`; });
        
        list.innerHTML = '';
        let q = document.getElementById('search').value.toLowerCase();
        sales.filter(x => x.name.toLowerCase().includes(q) || x.item.toLowerCase().includes(q)).forEach(s => {
            let rem = (parseFloat(s.total) - parseFloat(s.down) - (s.paid * parseFloat(s.monthly))).toFixed(2);
            list.innerHTML += `<tr><td>${s.name}</td><td>${s.item}</td><td>${s.total}$</td><td style="color:var(--primary)">${s.monthly}$</td><td><b style="color:${rem<=0?'var(--success)':'var(--danger)'}">${rem}$</b></td><td><button onclick="pay(${s.id})" style="background:none; border:1px solid var(--success); color:var(--success); border-radius:5px; cursor:pointer; padding:2px 8px;">+</button></td></tr>`;
        });
    }

    function exportToExcel() {
        let ws = XLSX.utils.json_to_sheet(sales.map(s => ({"کڕیار":s.name,"ئامێر":s.item,"گشتی":s.total,"پێشەکی":s.down,"قیست":s.monthly,"داینە":s.paid,"مێژوو":s.date})));
        let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sales"); XLSX.writeFile(wb, "Bizhar_Sales.xlsx");
    }

    function confirmReset() {
        if(confirm("ئەرێ تو پشت راستی تە دڤێت هەمی داتایان رەش بکەی؟")) {
            db.ref('/').set({ inventory: [], sales: [] });
            location.reload();
        }
    }
</script>
</body>
</html>
