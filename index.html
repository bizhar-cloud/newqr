<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIZHAR COMPUTER | PRO POS</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Inter:wght@400;700&display=swap');

        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --primary: #0866ff; --secondary: #65676b; --border: #dddfe2;
        }

        body.dark-mode {
            --bg: #0b0e14; --card: #1c1f26; --text: #e4e6eb; --primary: #4599ff; --secondary: #b0b3b8; --border: #3e4042;
        }

        * { box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        body { font-family: 'Noto Sans Arabic', 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        header { 
            background: var(--card); padding: 12px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container { max-width: 1300px; margin: 15px auto; padding: 0 10px; display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 992px) { .container { grid-template-columns: 380px 1fr; } }

        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: 700; color: var(--secondary); }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; 
            background: var(--bg); color: var(--text); font-size: 14px; outline: none;
        }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card { background: var(--card); padding: 15px; border-radius: 10px; text-align: center; border-left: 5px solid var(--primary); }
        .stat-card small { color: var(--secondary); font-size: 11px; }
        .stat-card h3 { margin: 5px 0 0; font-size: 18px; color: var(--primary); }

        .search-area { margin-bottom: 15px; }
        .table-wrap { background: var(--card); border-radius: 10px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th { background: rgba(0,0,0,0.03); padding: 12px; text-align: inherit; font-size: 13px; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .action-btns { display: flex; gap: 5px; }
        .btn-sm { padding: 6px 10px; border-radius: 5px; font-size: 12px; }

        #print-receipt { display: none; padding: 40px; background: white; color: black; }
        @media print { body * { display: none !important; } #print-receipt { display: block !important; } }
    </style>
</head>
<body id="app-body">

<header>
    <div style="font-weight: 900; color: var(--primary); font-size: 18px;">BIZHAR COMPUTER</div>
    <div style="display: flex; gap: 8px;">
        <select id="lang-sel" onchange="applyLang()" style="width: 70px; padding: 4px;">
            <option value="ku">KU</option>
            <option value="ar">AR</option>
            <option value="en">EN</option>
            <option value="fa">FA</option>
            <option value="tr">TR</option>
        </select>
        <button class="btn-outline" onclick="toggleTheme()" style="padding: 5px 10px; border-radius: 6px;"><i id="t-icon" class="fa-solid fa-moon"></i></button>
    </div>
</header>

<div class="container">
    <div class="sidebar">
        <div class="card">
            <h3 id="txt-form-title" style="margin-top:0">تۆمارکرن (Register)</h3>
            <div class="form-group">
                <label id="lbl-name">ناڤێ کڕیاری</label>
                <input type="text" id="inp-name" placeholder="...">
            </div>
            <div class="form-group">
                <label id="lbl-item">ئامێر</label>
                <select id="sel-item"></select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <div class="form-group"><label id="lbl-cost">بها $</label><input type="number" id="inp-cost" oninput="doCalc()"></div>
                <div class="form-group"><label id="lbl-down">پێشەکی $</label><input type="number" id="inp-down" oninput="doCalc()"></div>
            </div>
            <div class="form-group">
                <label id="lbl-months">هەیڤێن قیستێ</label>
                <select id="sel-months" onchange="doCalc()">
                    <option value="6">6 Months (38%)</option>
                    <option value="8">8 Months (45%)</option>
                    <option value="12">12 Months (56%)</option>
                    <option value="16">16 Months (75%)</option>
                </select>
            </div>
            <div style="background: var(--bg); padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; border: 1px dashed var(--primary);">
                <small id="lbl-monthly">هەیڤانە (Monthly)</small>
                <div id="out-monthly" style="font-size: 24px; font-weight: 900; color: var(--primary);">0.00 $</div>
            </div>
            <button class="btn btn-primary" onclick="saveOrder()" id="btn-save"><i class="fa-solid fa-save"></i> پاشکەفتکرن</button>
            <button class="btn btn-outline" style="margin-top:8px" onclick="manageStock()"><i class="fa-solid fa-box"></i> <span id="txt-stock">مەخزەن</span></button>
        </div>
    </div>

    <div class="main">
        <div class="stats-grid">
            <div class="stat-card"><small id="st-1">مەخزەن</small><h3 id="val-inv">0</h3></div>
            <div class="stat-card"><small id="st-2">کڕیار</small><h3 id="val-cust">0</h3></div>
            <div class="stat-card"><small id="st-3">قەرز</small><h3 id="val-debt">0 $</h3></div>
            <div class="stat-card"><small id="st-4">داهات</small><h3 id="val-inc">0 $</h3></div>
        </div>

        <div class="search-area">
            <input type="text" id="inp-search" onkeyup="renderUI()" placeholder="Search / گەڕیان...">
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th id="th-1">کڕیار</th><th id="th-2">ئامێر</th><th id="th-3">گشتی</th><th id="th-4">باقی</th><th id="th-5">کردار</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="print-receipt"></div>

<script>
    const firebaseConfig = { databaseURL: "https://bizhar-pos-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let inventory = [], sales = [];

    const translations = {
        ku: { dir: "rtl", name: "ناڤێ کڕیاری", item: "ئامێر", cost: "بها $", down: "پێشەکی $", m: "هەیڤێن قیستێ", mon: "هەیڤانە", save: "پاشکەفتکرن", stock: "مەخزەن", st1: "مەخزەن", st2: "کڕیار", st3: "قەرز", st4: "داهات", th1: "کڕیار", th2: "ئامێر", th3: "گشتی", th4: "باقی", th5: "کردار", search: "گەڕیان ب ناڤی..." },
        ar: { dir: "rtl", name: "اسم الزبون", item: "الجهاز", cost: "السعر $", down: "المقدمة $", m: "مدة القسط", mon: "القسط الشهري", save: "حفظ", stock: "المخزن", st1: "المخزن", st2: "الزبائن", st3: "الديون", st4: "الدخل", th1: "الزبون", th2: "الجهاز", th3: "المجموع", th4: "المتبقي", th5: "إجراء", search: "بحث بالاسم..." },
        en: { dir: "ltr", name: "Customer", item: "Item", cost: "Price $", down: "Down $", m: "Months", mon: "Monthly", save: "Save", stock: "Stock", st1: "Stock", st2: "Cust", st3: "Debt", st4: "Inc", th1: "Name", th2: "Item", th3: "Total", th4: "Rem", th5: "Act", search: "Search..." },
        fa: { dir: "rtl", name: "نام مشتری", item: "کالا", cost: "قیمت $", down: "پیش پرداخت $", m: "اقساط", mon: "ماهانه", save: "ثبت", stock: "انبار", st1: "انبار", st2: "مشتری", st3: "بدهی", st4: "درآمد", th1: "مشتری", th2: "کالا", th3: "کل", th4: "باقیمانده", th5: "عملیات", search: "جستجو..." },
        tr: { dir: "ltr", name: "Müşteri", item: "Ürün", cost: "Fiyat $", down: "Peşinat $", m: "Taksit", mon: "Aylık", save: "Kaydet", stock: "Stok", st1: "Stok", st2: "Müşteri", st3: "Borç", st4: "Gelir", th1: "İsim", th2: "Ürün", th3: "Toplam", th4: "Kalan", th5: "İşlem", search: "Ara..." }
    };

    function applyLang() {
        const l = document.getElementById('lang-sel').value;
        const t = translations[l];
        document.getElementById('app-body').dir = t.dir;
        document.getElementById('lbl-name').innerText = t.name;
        document.getElementById('lbl-item').innerText = t.item;
        document.getElementById('lbl-cost').innerText = t.cost;
        document.getElementById('lbl-down').innerText = t.down;
        document.getElementById('lbl-months').innerText = t.m;
        document.getElementById('lbl-monthly').innerText = t.mon;
        document.getElementById('btn-save').innerText = t.save;
        document.getElementById('txt-stock').innerText = t.stock;
        document.getElementById('st-1').innerText = t.st1;
        document.getElementById('st-2').innerText = t.st2;
        document.getElementById('st-3').innerText = t.st3;
        document.getElementById('st-4').innerText = t.st4;
        document.getElementById('th-1').innerText = t.th1;
        document.getElementById('th-2').innerText = t.th2;
        document.getElementById('th-3').innerText = t.th3;
        document.getElementById('th-4').innerText = t.th4;
        document.getElementById('th-5').innerText = t.th5;
        document.getElementById('inp-search').placeholder = t.search;
        renderUI();
    }

    db.ref('/').on('value', s => { const d = s.val(); if(d){ inventory=d.i||[]; sales=d.s||[]; renderUI(); } });

    function doCalc() {
        let p = parseFloat(document.getElementById('inp-cost').value)||0, d = parseFloat(document.getElementById('inp-down').value)||0, m = parseInt(document.getElementById('sel-months').value);
        let rate = {6:0.38, 8:0.45, 12:0.56, 16:0.75}[m];
        let total = p + (p * rate), mon = (total - d) / m;
        document.getElementById('out-monthly').innerText = mon.toFixed(2) + " $";
        return { total, mon, d, m };
    }

    function saveOrder() {
        let n = document.getElementById('inp-name').value, i = document.getElementById('sel-item').value;
        if(!n || !i) return alert("Hemiya pire bike!");
        let p = doCalc();
        let idx = inventory.findIndex(x => x.name === i);
        inventory[idx].qty--;
        sales.unshift({ id:Date.now(), name:n, item:i, total:p.total.toFixed(2), down:p.d.toFixed(2), mon:p.mon.toFixed(2), months:p.m, paid:0, date:new Date().toLocaleDateString() });
        db.ref('/').set({ i: inventory, s: sales });
        document.getElementById('inp-name').value = "";
    }

    function renderUI() {
        document.getElementById('val-inv').innerText = inventory.reduce((a,b)=>a+b.qty,0);
        document.getElementById('val-cust').innerText = sales.length;
        let dbt=0, inc=0;
        sales.forEach(s => { let p_v = parseFloat(s.down)+(s.paid*parseFloat(s.mon)); inc+=p_v; dbt+=(parseFloat(s.total)-p_v); });
        document.getElementById('val-debt').innerText = dbt.toFixed(1)+"$";
        document.getElementById('val-inc').innerText = inc.toFixed(1)+"$";

        let sel = document.getElementById('sel-item'), tb = document.getElementById('table-body'), q = document.getElementById('inp-search').value.toLowerCase();
        sel.innerHTML = ''; inventory.forEach(x => { if(x.qty>0) sel.innerHTML += `<option value="${x.name}">${x.name} (${x.qty})</option>`; });
        
        tb.innerHTML = '';
        sales.filter(s => s.name.toLowerCase().includes(q)).forEach(s => {
            let rem = (parseFloat(s.total) - parseFloat(s.down) - (s.paid * parseFloat(s.mon))).toFixed(1);
            tb.innerHTML += `<tr>
                <td><b>${s.name}</b><br><small>${s.date}</small></td>
                <td>${s.item}</td><td>${s.total}$</td><td style="color:${rem>0?'red':'green'}"><b>${rem}$</b></td>
                <td class="action-btns">
                    <button class="btn-outline btn-sm" onclick="pay(${s.id})">+</button>
                    <button class="btn-outline btn-sm" onclick="printOne(${s.id})"><i class="fa-solid fa-print"></i></button>
                </td>
            </tr>`;
        });
    }

    function pay(id) { let s=sales.find(x=>x.id===id); if(s.paid < s.months){ s.paid++; db.ref('/').set({i:inventory, s:sales}); } }

    function printOne(id) {
        let s = sales.find(x => x.id === id);
        let rem = (parseFloat(s.total) - parseFloat(s.down) - (s.paid * parseFloat(s.mon))).toFixed(1);
        document.getElementById('print-receipt').innerHTML = `
            <div style="text-align:center"><h2>BIZHAR COMPUTER</h2><hr></div>
            <p><b>Customer:</b> ${s.name}</p><p><b>Item:</b> ${s.item}</p>
            <p><b>Total:</b> ${s.total}$</p><p><b>Monthly:</b> ${s.mon}$</p>
            <p><b>Remaining:</b> ${rem}$</p><p><b>Date:</b> ${s.date}</p>
            <br><br><div style="display:flex; justify-content:space-between"><span>Sign: _________</span><span>Stamp: _________</span></div>`;
        window.print();
    }

    function manageStock() {
        let p = prompt("Password:");
        if(p === "1234") {
            let action = prompt("1: Add Item, 2: Backup Data, 3: Restore Data");
            if(action === "1") {
                let n = prompt("Item Name:"), q = parseInt(prompt("Qty:"));
                if(n && q) { let f=inventory.find(x=>x.name===n); if(f) f.qty+=q; else inventory.push({name:n, qty:q}); db.ref('/').set({i:inventory, s:sales}); }
            } else if(action === "2") {
                let blob = new Blob([JSON.stringify({i:inventory, s:sales})], {type: "application/json"});
                let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "bizhar_backup.json"; a.click();
            } else if(action === "3") {
                alert("Please select the backup file in the next step.");
                let input = document.createElement('input'); input.type = 'file';
                input.onchange = e => {
                    let file = e.target.files[0];
                    let reader = new FileReader();
                    reader.onload = event => { let data = JSON.parse(event.target.result); db.ref('/').set(data); alert("Restored!"); };
                    reader.readAsText(file);
                }; input.click();
            }
        }
    }

    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    window.onload = applyLang;
</script>
</body>
</html>
