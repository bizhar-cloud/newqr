<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIZHAR COMPUTER | GLOBAL POS</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Orbitron:wght@600;900&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --bg-body: #05070a;
            --bg-side: rgba(10, 12, 18, 0.9);
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        /* Light Mode Styles */
        body.light-mode {
            --bg-body: #f0f2f5;
            --bg-side: #ffffff;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --border: rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.25s ease; }
        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main); margin: 0; min-height: 100vh;
        }

        /* Layout */
        .app-grid { display: grid; grid-template-columns: 360px 1fr; min-height: 100vh; }

        /* Sidebar */
        .sidebar { 
            background: var(--bg-side); backdrop-filter: blur(20px); 
            border-inline-end: 1px solid var(--border); padding: 25px; 
            position: sticky; top: 0; height: 100vh; overflow-y: auto;
        }

        .top-tools { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .tool-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); padding: 8px; border-radius: 8px; cursor: pointer; }

        .brand-name { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); text-align: center; font-size: 22px; margin-bottom: 30px; }

        /* Inputs & UI */
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input, select { 
            width: 100%; padding: 12px; background: rgba(128,128,128,0.1); 
            border: 1px solid var(--border); border-radius: 10px; color: var(--text-main); margin-bottom: 12px;
        }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--neon-blue); color: #000; }
        .btn-admin { background: transparent; border: 1px solid var(--border); color: var(--text-main); margin-top: 10px; }

        /* Stats */
        .main-panel { padding: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-item { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-item h2 { margin: 5px 0 0; color: var(--neon-blue); font-family: 'Orbitron'; }

        /* Table */
        .table-container { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(128,128,128,0.05); padding: 15px; text-align: start; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }

        /* Print Invoice */
        #invoice-print { display: none; background: #fff; color: #000; padding: 40px; }
        @media print { body * { display: none !important; } #invoice-print { display: block !important; } }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 40px; }

        /* Language-specific alignment */
        [dir="ltr"] .sidebar { border-right: 1px solid var(--border); border-left: none; }
    </style>
</head>
<body class="dark-mode">

<div class="app-grid">
    <div class="sidebar">
        <div class="top-tools">
            <button class="tool-btn" onclick="toggleTheme()"><i id="theme-icon" class="fa-solid fa-sun"></i></button>
            <select class="tool-btn" id="lang-select" onchange="changeLang()" style="width: auto; margin:0;">
                <option value="ku">Kurdî</option>
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="fa">فارسی</option>
                <option value="tr">Türkçe</option>
            </select>
        </div>

        <div class="brand-name">BIZHAR COMPUTER</div>

        <div class="card">
            <h4 id="t-new-sale">فرۆشتنا نوو</h4>
            <input type="text" id="c-name" data-i18n="placeholder:p-name">
            <select id="item-select"></select>
            <div style="display:flex; gap:8px;">
                <input type="number" id="cost-in" data-i18n="placeholder:p-cost" oninput="recalc()">
                <input type="number" id="down-in" data-i18n="placeholder:p-down" oninput="recalc()">
            </div>
            <select id="months-in" onchange="recalc()">
                <option value="6">6 <span data-i18n="months">Months</span> (38%)</option>
                <option value="8">8 <span data-i18n="months">Months</span> (45%)</option>
                <option value="12">12 <span data-i18n="months">Months</span> (56%)</option>
                <option value="16">16 <span data-i18n="months">Months</span> (75%)</option>
            </select>
            <div style="background:rgba(0,242,255,0.1); padding:15px; border-radius:12px; text-align:center;">
                <span id="t-monthly-label" style="font-size:11px; opacity:0.7;">هەیڤانە</span>
                <div id="out-monthly" style="font-size:24px; font-weight:900; color:var(--neon-blue); font-family:'Orbitron'">0.00 $</div>
            </div>
            <button class="btn btn-primary" onclick="addSale()" id="t-add-btn">تۆمارکرن</button>
            <button class="btn btn-admin" onclick="openAdmin()" id="t-settings-btn">ڕێکخستن</button>
        </div>
    </div>

    <div class="main-panel">
        <div class="stats-grid">
            <div class="stat-item"><span id="t-s-inv">مەخزەن</span><h2 id="s-inv">0</h2></div>
            <div class="stat-item"><span id="t-s-cust">کڕیاران</span><h2 id="s-cust">0</h2></div>
            <div class="stat-item"><span id="t-s-debt">قەرزان</span><h2 id="s-debt">0 $</h2></div>
            <div class="stat-item"><span id="t-s-income">داهات</span><h2 id="s-income">0 $</h2></div>
        </div>

        <div class="table-container">
            <table id="sales-table">
                <thead>
                    <tr>
                        <th id="th-name">کڕیار</th>
                        <th id="th-item">ئامێر</th>
                        <th id="th-total">کۆی گشتی</th>
                        <th id="th-rem">باقی</th>
                        <th id="th-action">کردار</th>
                    </tr>
                </thead>
                <tbody id="log-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="invoice-print">
    <h1 style="text-align:center;">BIZHAR COMPUTER</h1>
    <hr>
    <p><b>Name:</b> <span id="p-name-val"></span></p>
    <p><b>Item:</b> <span id="p-item-val"></span></p>
    <p><b>Total:</b> <span id="p-total-val"></span> $</p>
    <p><b>Monthly:</b> <span id="p-monthly-val"></span> $</p>
    <p><b>Balance:</b> <span id="p-rem-val"></span> $</p>
    <div style="margin-top:50px; display:flex; justify-content:space-between;">
        <span>Customer Sign: __________</span>
        <span>Stamp & Sign: __________</span>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="card" style="max-width:500px; margin:auto; background:var(--bg-side);">
        <h2 id="t-admin-title">ڕێکخستنا مەخزەنی</h2>
        <input type="text" id="st-name" placeholder="Item Name">
        <input type="number" id="st-qty" placeholder="Quantity">
        <button class="btn btn-primary" onclick="addStock()">+ Add Stock</button>
        <button class="btn btn-admin" onclick="exportToExcel()">Export Excel</button>
        <button class="btn btn-admin" style="color:var(--neon-red)" onclick="confirmReset()">Clear All Data</button>
        <button class="btn btn-admin" onclick="closeAdmin()">Close</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bizhar-pos-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let inv = [], sales = [], currentLang = 'ku';

    const i18n = {
        ku: { newSale: "فرۆشتنا نوو", pName: "ناڤێ کڕیاری", pCost: "بهایێ کڕینێ $", pDown: "پێشەکی $", add: "تۆمارکرن", settings: "ڕێکخستن", inv: "مەخزەن", cust: "کڕیاران", debt: "قەرزان", income: "داهات", thName: "کڕیار", thItem: "ئامێر", thTotal: "کۆی گشتی", thRem: "باقی", thAct: "کردار", monthly: "هەیڤانە", admin: "ڕێکخستنا مەخزەنی" },
        ar: { newSale: "بيع جديد", pName: "اسم الزبون", pCost: "سعر الشراء $", pDown: "المقدمة $", add: "تسجيل", settings: "الإعدادات", inv: "المخزن", cust: "الزبائن", debt: "الديون", income: "الدخل", thName: "الزبون", thItem: "الجهاز", thTotal: "المجموع", thRem: "المتبقي", thAct: "إجراء", monthly: "القسط الشهري", admin: "إدارة المخزن" },
        en: { newSale: "New Sale", pName: "Customer Name", pCost: "Cost Price $", pDown: "Down Payment $", add: "Register", settings: "Settings", inv: "Stock", cust: "Customers", debt: "Debts", income: "Income", thName: "Customer", thItem: "Item", thTotal: "Total", thRem: "Balance", thAct: "Action", monthly: "Monthly", admin: "Stock Management" },
        fa: { newSale: "فروش جدید", pName: "نام مشتری", pCost: "قیمت خرید $", pDown: "پیش‌پرداخت $", add: "ثبت", settings: "تنظیمات", inv: "موجودی", cust: "مشتریان", debt: "بدهی‌ها", income: "درآمد", thName: "مشتری", thItem: "دستگاه", thTotal: "کل", thRem: "باقیمانده", thAct: "عملیات", monthly: "ماهیانه", admin: "مدیریت انبار" },
        tr: { newSale: "Yeni Satış", pName: "Müşteri Adı", pCost: "Alış Fiyatı $", pDown: "Peşinat $", add: "Kaydet", settings: "Ayarlar", inv: "Stok", cust: "Müşteriler", debt: "Borçlar", income: "Gelir", thName: "Müşteri", thItem: "Ürün", thTotal: "Toplam", thRem: "Kalan", thAct: "İşlem", monthly: "Aylık", admin: "Stok Yönetimi" }
    };

    function changeLang() {
        currentLang = document.getElementById('lang-select').value;
        const t = i18n[currentLang];
        document.body.dir = (currentLang === 'en' || currentLang === 'tr') ? 'ltr' : 'rtl';
        document.getElementById('t-new-sale').innerText = t.newSale;
        document.getElementById('c-name').placeholder = t.pName;
        document.getElementById('cost-in').placeholder = t.pCost;
        document.getElementById('down-in').placeholder = t.pDown;
        document.getElementById('t-add-btn').innerText = t.add;
        document.getElementById('t-settings-btn').innerText = t.settings;
        document.getElementById('t-s-inv').innerText = t.inv;
        document.getElementById('t-s-cust').innerText = t.cust;
        document.getElementById('t-s-debt').innerText = t.debt;
        document.getElementById('t-s-income').innerText = t.income;
        document.getElementById('th-name').innerText = t.thName;
        document.getElementById('th-item').innerText = t.thItem;
        document.getElementById('th-total').innerText = t.thTotal;
        document.getElementById('th-rem').innerText = t.thRem;
        document.getElementById('th-action').innerText = t.thAct;
        document.getElementById('t-monthly-label').innerText = t.monthly;
        document.getElementById('t-admin-title').innerText = t.admin;
        ui();
    }

    function toggleTheme() {
        const b = document.body;
        const icon = document.getElementById('theme-icon');
        if(b.classList.contains('light-mode')) {
            b.classList.remove('light-mode');
            icon.className = 'fa-solid fa-sun';
        } else {
            b.classList.add('light-mode');
            icon.className = 'fa-solid fa-moon';
        }
    }

    // Database Sync
    db.ref('/').on('value', snap => { const d = snap.val(); if(d){ inv=d.i||[]; sales=d.s||[]; ui(); } });

    function recalc() {
        let c = parseFloat(document.getElementById('cost-in').value)||0, d = parseFloat(document.getElementById('down-in').value)||0, m = parseInt(document.getElementById('months-in').value);
        let rates = {6:0.38, 8:0.45, 12:0.56, 16:0.75};
        let total = c + (c * rates[m]);
        let monthly = (total - d) / m;
        document.getElementById('out-monthly').innerText = monthly.toFixed(2) + " $";
        return { total, monthly, d, m };
    }

    function addSale() {
        let n = document.getElementById('c-name').value, i = document.getElementById('item-select').value;
        if(!n || !i) return alert("Fill all!");
        let p = recalc();
        let idx = inv.findIndex(x => x.name === i);
        inv[idx].qty--;
        sales.unshift({ id:Date.now(), name:n, item:i, total:p.total.toFixed(2), down:p.d.toFixed(2), monthly:p.monthly.toFixed(2), months:p.m, paid:0, date:new Date().toLocaleDateString() });
        db.ref('/').set({ i: inv, s: sales });
    }

    function ui() {
        document.getElementById('s-inv').innerText = inv.reduce((a,b)=>a+b.qty,0);
        document.getElementById('s-cust').innerText = sales.length;
        let dbt=0, inc=0;
        sales.forEach(s => { let p_v = parseFloat(s.down)+(s.paid*parseFloat(s.monthly)); inc+=p_v; dbt+=(parseFloat(s.total)-p_v); });
        document.getElementById('s-debt').innerText = dbt.toFixed(2)+"$"; document.getElementById('s-income').innerText = inc.toFixed(2)+"$";
        
        let sel = document.getElementById('item-select'), list = document.getElementById('log-list');
        sel.innerHTML = '<option value="">...</option>';
        inv.forEach(x => { if(x.qty>0) sel.innerHTML += `<option value="${x.name}">${x.name} (${x.qty})</option>`; });
        
        list.innerHTML = '';
        sales.forEach(s => {
            let rem = (parseFloat(s.total) - parseFloat(s.down) - (s.paid * parseFloat(s.monthly))).toFixed(2);
            list.innerHTML += `<tr><td>${s.name}</td><td>${s.item}</td><td>${s.total}$</td><td>${rem}$</td>
            <td><button class="tool-btn" onclick="pay(${s.id})">+</button><button class="tool-btn" onclick="printInv(${s.id})"><i class="fa-solid fa-print"></i></button></td></tr>`;
        });
    }

    function pay(id) { let s=sales.find(x=>x.id===id); if(s.paid<s.months){ s.paid++; db.ref('/').set({i:inv, s:sales}); } }
    function printInv(id) {
        let s=sales.find(x=>x.id===id);
        let rem = (parseFloat(s.total) - parseFloat(s.down) - (s.paid * parseFloat(s.monthly))).toFixed(2);
        document.getElementById('p-name-val').innerText = s.name;
        document.getElementById('p-item-val').innerText = s.item;
        document.getElementById('p-total-val').innerText = s.total;
        document.getElementById('p-monthly-val').innerText = s.monthly;
        document.getElementById('p-rem-val').innerText = rem;
        window.print();
    }
    function openAdmin() { let p=prompt("Password:"); if(p==="1234") document.getElementById('admin-modal').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display='none'; }
    function addStock() {
        let n=document.getElementById('st-name').value, q=parseInt(document.getElementById('st-qty').value);
        if(n&&q){ let f=inv.find(x=>x.name===n); if(f) f.qty+=q; else inv.push({name:n, qty:q}); db.ref('/').set({i:inv, s:sales}); }
    }
    function exportToExcel() { let ws = XLSX.utils.json_to_sheet(sales); let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sales"); XLSX.writeFile(wb, "Bizhar_POS.xlsx"); }
    function confirmReset() { if(confirm("Clear all data?")) db.ref('/').set({i:[], s:[]}); }
</script>
</body>
</html>
