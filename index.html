<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Installments POS - ELITE V8.7</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/3WMQdH2P/17ABF58A-85E9-4C1A-B6DD-97977E81AA3C.jpg">
    <link rel="icon" href="https://i.postimg.cc/3WMQdH2P/17ABF58A-85E9-4C1A-B6DD-97977E81AA3C.jpg">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Roboto:wght@400;700&display=swap');

        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --primary: #2563eb; 
            --neon-blue: #00d2ff; --neon-purple: #bd00ff; --border: #cbd5e1; --success: #10b981; --danger: #ef4444;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body.dark-mode {
            --bg: #020617; --card: #0f172a; --text: #f1f5f9; --primary: #3b82f6; 
            --neon-blue: #00f2ff; --neon-purple: #df00ff; --border: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans Arabic', 'Roboto', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }

        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 999999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .login-box { background: var(--card); padding: 40px; border-radius: 30px; border: 2px solid var(--neon-blue); width: 350px; text-align: center; box-shadow: 0 0 50px rgba(0,210,255,0.2); }

        header { 
            background: var(--card); height: 80px; padding: 0 20px; 
            border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .brand h2 { font-weight: 900; background: linear-gradient(135deg, #00d2ff, #bd00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .settings-btn, .notif-btn { width: 45px; height: 45px; border-radius: 12px; background: var(--bg); color: var(--neon-blue); display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--neon-blue); cursor: pointer; position: relative; }
        
        .notif-btn.active { color: var(--danger); border-color: var(--danger); animation: bell-ring 0.5s infinite; }
        @keyframes bell-ring {
            0%, 100% { transform: rotate(0); }
            20% { transform: rotate(15deg); }
            40% { transform: rotate(-15deg); }
            60% { transform: rotate(10deg); }
            80% { transform: rotate(-10deg); }
        }
        .notif-count { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid var(--card); }

        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .menu-overlay.show { display: flex; }
        .dropdown-menu { background: var(--card); border-radius: 30px; width: 340px; padding: 25px; border: 2px solid var(--neon-blue); max-height: 90vh; overflow-y: auto; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 16px; border-radius: 18px; cursor: pointer; color: var(--text); border: none; background: none; width: 100%; font-weight: 700; transition: 0.2s; margin-bottom: 8px; }
        .menu-item i { width: 25px; color: var(--neon-blue); text-align: center; }
        .menu-item:hover { background: var(--bg); border-right: 5px solid var(--neon-blue); }

        #lang-sel { 
            width: 100%; height: 55px; border: 2px solid var(--neon-blue); border-radius: 18px; margin-top: 15px; 
            font-weight: bold; background: var(--card); color: var(--text); padding: 0 15px; text-align: right; appearance: none;
            background-repeat: no-repeat; background-position: left 15px center;
        }
        body[dir="ltr"] #lang-sel { text-align: left; background-position: right 15px center; }

        .container { width: 100%; max-width: 1400px; margin: 25px auto; padding: 0 15px; }
        .pc-mode-active { display: grid !important; grid-template-columns: 420px 1fr !important; gap: 30px; }
        
        .card { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: var(--shadow); }
        input, select, textarea { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 15px; background: var(--bg); color: var(--text); margin-top: 8px; outline: none; font-size: 16px; font-family: inherit; }

        .main-btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 900; background: linear-gradient(45deg, var(--primary), var(--neon-blue)); color: white; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .table-wrap { background: var(--card); border-radius: 25px; overflow-x: auto; border: 1.5px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th { background: var(--bg); padding: 18px; color: var(--primary); font-weight: 900; font-size: 13px; text-align: center; }
        td { padding: 18px; border-bottom: 1px solid var(--border); text-align: center; font-weight: 600; }

        .btn-sm { width: 40px; height: 40px; border-radius: 12px; border: none; color: white; cursor: pointer; margin: 3px; }
        .privacy-toggle { cursor: pointer; font-size: 18px; margin-left: 8px; color: var(--primary); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1.5px solid var(--border); text-align: center; position: relative; }
        .stat-card h3 { font-size: 24px; font-weight: 900; margin-top: 5px; }
        .stat-card small { color: #64748b; font-weight: 700; font-size: 11px; display: block; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 99999; backdrop-filter: blur(12px); }
        .modal-card { background: var(--card); border-radius: 35px; padding: 30px; border: 2px solid var(--neon-blue); width: 95%; max-width: 850px; max-height: 90vh; overflow-y: auto; }

        #reader-box { width: 100% !important; border-radius: 15px; overflow: hidden; background: #000; position: relative; border: 2px solid var(--neon-blue); min-height: 300px; }
        #reader-box video { width: 100% !important; height: auto !important; object-fit: cover !important; border-radius: 15px; }

        .scan-action-btn { background: #6366f1; color: white; padding: 12px; border-radius: 12px; border: none; cursor: pointer; transition: 0.3s; }
        
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

        .report-tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 80px; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-weight: bold; font-size: 12px; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .rep-sum-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .rep-stat { background: var(--bg); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }

        #print-area { display: none; }
        @media print {
            @page { margin: 0; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                display: block !important; 
                position: absolute; left: 0; top: 0; 
                width: 100%; padding: 4mm; 
                background: white; color: black; 
                font-family: 'Noto Sans Arabic', sans-serif;
                font-size: 10pt; line-height: 1.4;
            }
            .print-80mm { width: 76mm !important; margin: 0 auto; }
            .print-58mm { width: 54mm !important; margin: 0 auto; }
            .label-print { width: 40mm; height: 20mm; text-align: center; border: 0.2mm solid #000; padding: 2mm; margin: 0 auto; }
            
            .thermal-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 3mm; margin-bottom: 3mm; }
            .thermal-logo { width: 45mm; height: auto; margin-bottom: 2mm; filter: grayscale(1); }
            .thermal-row { display: flex; justify-content: space-between; margin-bottom: 2mm; border-bottom: 0.1mm solid #eee; }
            .thermal-row b { font-weight: 900; }
            .thermal-footer { text-align: center; border-top: 1px dashed #000; padding-top: 3mm; margin-top: 4mm; font-size: 9pt; }
            .receipt-title { font-weight: 900; border: 1px solid #000; padding: 1.5mm 3mm; display: inline-block; margin-bottom: 3mm; font-size: 11pt; border-radius: 2mm; }
            #qr-code-final { margin: 4mm auto; display: block; }
            #qr-code-final img { margin: 0 auto; }
            .thermal-item-box { background: #f9f9f9; padding: 2mm; border-radius: 1mm; margin: 2mm 0; }
        }

        .dev-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white !important;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            transition: 0.3s;
        }
        .dev-link:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }

        .notif-item { background: var(--bg); padding: 15px; border-radius: 15px; border: 1.5px solid var(--border); margin-bottom: 10px; position: relative; }
        .notif-item b { color: var(--danger); display: block; }
        .notif-item span { font-size: 13px; font-weight: 600; }

        .receipt-preview {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .print-settings {
            background: var(--bg);
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .history-list { list-style: none; padding: 0; }
        .history-item { 
            background: var(--bg); 
            margin-bottom: 10px; 
            padding: 15px; 
            border-radius: 15px; 
            border-right: 4px solid var(--success);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Styles for document upload */
        .upload-area { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .upload-btn { background: #475569; color: white; border: none; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #doc-preview { width: 100%; max-height: 200px; object-fit: contain; border-radius: 15px; margin-top: 10px; display: none; border: 2px solid var(--border); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <img src="https://i.postimg.cc/nV1HLXWy/EFAC45A5-C196-48E5-913E-A27706778B90.jpg" style="width: 100%; border-radius: 20px; margin-bottom: 20px;">
        <h2 id="login-title" style="color:var(--neon-blue); margin-bottom:20px; font-weight: 900;">Installments POS</h2>
        <input type="text" id="login-user" placeholder="USERNAME">
        <input type="password" id="login-pass" placeholder="PASSWORD">
        <button class="main-btn" id="login-btn" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<header>
    <div class="header-actions">
        <button class="notif-btn" id="notif-bell" onclick="showNotifs()">
            <i class="fa-solid fa-bell"></i>
            <div id="notif-badge" class="notif-count" style="display:none">0</div>
        </button>
    </div>
    <div class="brand"><h2>Installments POS</h2></div>
    <div class="header-actions">
        <button class="settings-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></button>
    </div>
</header>

<div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()">
    <div class="dropdown-menu" onclick="event.stopPropagation()">
        <h4 id="m-header" style="text-align:center; color:var(--neon-blue); margin-bottom:20px; font-weight: 900;">MENU</h4>
        <button class="menu-item" onclick="toggleLayout()"><i class="fa-solid fa-display"></i> <span id="m-pc">PC Mode</span></button>
        <button class="menu-item" onclick="toggleDark()"><i id="mode-icon" class="fa-solid fa-moon"></i> <span id="m-dark">Dark Mode</span></button>
        <button class="menu-item" onclick="showReports('daily')"><i class="fa-solid fa-chart-line"></i> <span id="m-reports">Reports</span></button>
        <button class="menu-item" onclick="showDailyClosing()"><i class="fa-solid fa-cash-register"></i> <span id="m-closing">Daily Closing</span></button>
        <button class="menu-item" onclick="showCashDrawer()"><i class="fa-solid fa-vault"></i> <span id="m-vault">Cash Drawer</span></button>
        <button class="menu-item" onclick="showArchive()"><i class="fa-solid fa-folder-open"></i> <span id="m-archive">Archive</span></button>
        <button class="menu-item" onclick="showRecycleBin()"><i class="fa-solid fa-trash-can"></i> <span id="m-trash">Recycle Bin</span></button>
        <button class="menu-item" onclick="checkInvPass()"><i class="fa-solid fa-boxes-stacked"></i> <span id="m-add">Inventory</span></button>
        <button class="menu-item" onclick="showLabelMaker()"><i class="fa-solid fa-tags"></i> <span id="m-label">Label Maker</span></button>
        <hr style="border: 0.5px solid var(--border); margin: 15px 0;">
        <button class="menu-item" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> <span id="m-backup">Export Excel</span></button>
        <button class="menu-item" onclick="exportJSON()"><i class="fa-solid fa-file-code"></i> <span id="m-backup-json">Backup (JSON)</span></button>
        <button class="menu-item" onclick="exportPDF()"><i class="fa-solid fa-file-pdf"></i> <span id="m-pdf">Export PDF</span></button>
        <button class="menu-item" onclick="triggerRestore()"><i class="fa-solid fa-cloud-arrow-up"></i> <span id="m-restore">Restore Data</span></button>
        <input type="file" id="restore-input" style="display:none" accept=".json" onchange="restoreData(event)">
        <button class="menu-item" onclick="showAbout()"><i class="fa-solid fa-user-gear"></i> <span id="m-about">Developer</span></button>
        
        <select id="lang-sel" onchange="applyLang()">
            <option value="bd">کوردی (بادینی)</option>
            <option value="sr">کوردی (سۆرانی)</option>
            <option value="ar">العربية (Arabic)</option>
            <option value="en">English (US)</option>
            <option value="tr">Türkçe (Turkish)</option>
            <option value="fa">فارسی (Persian)</option>
        </select>
        
        <button class="menu-item" onclick="logout()" style="color:var(--danger); margin-top: 15px;"><i class="fa-solid fa-power-off"></i> <span id="m-logout">Logout</span></button>
        <button class="main-btn" onclick="toggleMenu()" id="btn-close" style="background:#475569; margin-top: 20px;">CLOSE</button>
    </div>
</div>

<div class="container" id="app-container">
    <div id="side-p">
        <div class="card" style="border-top: 6px solid var(--primary);">
            <h3 id="t-form" style="font-weight: 900; color: var(--primary);"><i class="fa-solid fa-cart-plus"></i> NEW SALE</h3>
            
            <label id="l-sale-type" style="font-weight: 700; margin-top: 15px; display: block;">SALE TYPE</label>
            <select id="i-sale-type" onchange="toggleSaleMode()">
                <option value="Installments" id="opt-inst">Installments (بقیست)</option>
                <option value="Cash" id="opt-cash">Cash (کاش)</option>
                <option value="Debt" id="opt-debt">Debt (قەرز/دەین)</option>
            </select>

            <label id="l-name" style="font-weight: 700; margin-top: 15px; display: block;">CUSTOMER NAME</label>
            <input type="text" id="i-name" placeholder="...">

            <label id="l-phone" style="font-weight: 700; margin-top: 15px; display: block;">CUSTOMER PHONE</label>
            <input type="tel" id="i-phone" placeholder="0750 xxx xxxx" pattern="[0-9]*">

            <div class="upload-area">
                <label style="font-weight: 700; display: block;">CUSTOMER DOCUMENT (ناسنامە)</label>
                <button class="upload-btn" onclick="document.getElementById('doc-file').click()">
                    <i class="fa-solid fa-camera"></i> <span id="l-upload-text">TAKE PHOTO / UPLOAD</span>
                </button>
                <input type="file" id="doc-file" accept="image/*" capture="environment" style="display:none" onchange="previewDoc(this)">
                <img id="doc-preview" src="">
            </div>

            <div id="witness-section">
                <label id="l-witness" style="font-weight: 700; margin-top: 15px; display: block;">WITNESS NAME</label>
                <input type="text" id="i-witness" placeholder="...">

                <label id="l-witness-phone" style="font-weight: 700; margin-top: 15px; display: block;">WITNESS PHONE</label>
                <input type="tel" id="i-witness-phone" placeholder="0750 xxx xxxx" pattern="[0-9]*">
            </div>

            <label id="l-item" style="margin-top:20px; display:block; font-weight: 700;">ITEM</label>
            <div style="display: flex; gap: 8px;">
                <select id="i-item" style="flex: 1;" onchange="updateDetailsHint()"></select>
                <button onclick="scanForSale()" class="scan-action-btn" style="margin-top: 8px;"><i class="fa-solid fa-barcode-read"></i><i class="fa-solid fa-qrcode"></i></button>
            </div>
            <div id="item-details-hint" style="font-size: 11px; color: var(--primary); margin-top: 5px; font-weight: bold;"></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px;">
                <div><label id="l-buy" style="font-weight: 700;">SALES PRICE $</label><input type="number" id="i-buy" oninput="calc()" placeholder="0.00"></div>
                <div id="down-pay-section">
                    <label id="l-down" style="font-weight: 700;">DOWN PAY $</label>
                    <input type="number" id="i-down" oninput="calc()" placeholder="0.00">
                </div>
            </div>

            <div id="installments-details-section">
                <label id="l-duration" style="margin-top:20px; display:block; font-weight: 700;">PLAN</label>
                <select id="i-months" onchange="toggleOtherPlan(); calc();">
                    <option value="2">2 Months (15%)</option>
                    <option value="3">3 Months (25%)</option>
                    <option value="4">4 Months (35%)</option>
                    <option value="6">6 Months (40%)</option>
                    <option value="8">8 Months (50%)</option>
                    <option value="10">10 Months (60%)</option>
                    <option value="12">12 Months (70%)</option>
                    <option value="16">16 Months (85%)</option>
                    <option value="Other" id="opt-other-plan">Other (دەستکاری قازانجی بکە)</option>
                </select>

                <div id="other-plan-section" style="display:none; margin-top:10px;">
                    <label id="l-other-rate" style="font-weight:700;">CUSTOM RATE %</label>
                    <input type="number" id="i-other-rate" oninput="calc()" placeholder="Ex: 20">
                    <label id="l-other-months" style="font-weight:700; margin-top:10px; display:block;">CUSTOM MONTHS</label>
                    <input type="number" id="i-other-months" oninput="calc()" placeholder="Ex: 5">
                </div>
            </div>

            <label id="l-note-title" style="margin-top:20px; display:block; font-weight: 700;">NOTES</label>
            <textarea id="i-note" rows="2"></textarea>

            <div style="display:flex; justify-content:space-between; margin-top:25px; background:var(--bg); padding:20px; border-radius:20px; border:2px dashed var(--neon-blue);">
                <div style="text-align:center;"><small id="l-total-box" style="color:#64748b;">TOTAL</small><div id="o-total" style="font-weight:900; font-size:24px;">$0</div></div>
                <div id="monthly-output-section" style="text-align:center;"><small id="l-mon" style="color:#64748b;">MONTHLY</small><div id="o-mon" style="font-weight:900; color:var(--primary); font-size:24px;">$0</div></div>
            </div>
            <button class="main-btn" onclick="saveSale()"><i class="fa-solid fa-floppy-disk"></i> <span id="b-save">SAVE</span></button>
        </div>
    </div>

    <div id="main-p">
        <div class="stats-grid">
            <div class="stat-card" style="border-bottom: 5px solid var(--neon-blue);">
                <small id="s1">STOCK</small><h3 id="v1" style="color:var(--neon-blue)">0</h3>
            </div>
            <div class="stat-card" style="border-bottom: 5px solid var(--success);">
                <small id="s4">PROFIT <i class="fa-solid fa-eye privacy-toggle" onclick="togglePrivacy()"></i></small>
                <h3 id="v4" style="color:var(--success)">****</h3>
            </div>
            <div class="stat-card" style="border-bottom: 5px solid var(--neon-purple);">
                <small id="s-rem">OUTSTANDING</small><h3 id="v-rem" style="color:var(--neon-purple)">$0</h3>
            </div>
            <div class="stat-card" style="border-bottom: 5px solid #f59e0b;">
                <small id="s-annual">YEARLY FORECAST</small><h3 id="v-annual" style="color:#f59e0b">****</h3>
            </div>
        </div>
        <input type="text" id="search-input" placeholder="..." oninput="handleSearch()" style="margin-bottom:20px; border: 2px solid var(--border);">
        <div class="table-wrap">

    function previewDoc(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('doc-preview');
                img.src = e.target.result;

                currentDocBase64 = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function toggleSaleMode() {
        const type = document.getElementById('i-sale-type').value;
        const instSection = document.getElementById('installments-details-section');
        const witnessSection = document.getElementById('witness-section');
        const monthlySection = document.getElementById('monthly-output-section');
        const downSection = document.getElementById('down-pay-section');
        
        if (type === 'Cash') {
            instSection.style.display = 'none';
            witnessSection.style.display = 'none';
            monthlySection.style.visibility = 'hidden';
            downSection.style.visibility = 'hidden';
            document.getElementById('i-down').value = 0;
        } else if (type === 'Debt') {
            instSection.style.display = 'none';
            witnessSection.style.display = 'none';
            monthlySection.style.visibility = 'hidden';
            downSection.style.visibility = 'visible';
        } else {
            instSection.style.display = 'block';
            witnessSection.style.display = 'block';
            monthlySection.style.visibility = 'visible';
            downSection.style.visibility = 'visible';
        }
        calc();
    }

    function toggleOtherPlan() {
        const val = document.getElementById('i-months').value;
        document.getElementById('other-plan-section').style.display = (val === 'Other') ? 'block' : 'none';
    }

    function calc() {
        const type = document.getElementById('i-sale-type').value;
        let b = parseFloat(document.getElementById('i-buy').value)||0; 
        let d = parseFloat(document.getElementById('i-down').value)||0; 
        let total = b;
        let mon = 0;
        let m = 1;

        if (type === 'Installments') {
            let selectedPlan = document.getElementById('i-months').value;
            let rate = 0;
            
            if (selectedPlan === 'Other') {
                rate = (parseFloat(document.getElementById('i-other-rate').value)||0) / 100;
                m = parseInt(document.getElementById('i-other-months').value)||1;
                if(m <= 0 || isNaN(m)) m = 1;
            } else {
                let rates = {2:0.15, 3:0.25, 4:0.35, 6:0.40, 8:0.50, 10:0.60, 12:0.70, 16:0.85};
                m = parseInt(selectedPlan);
                rate = rates[m] || 0;
            }
            
            let remainingBase = b - d;
            let profitAmount = remainingBase * rate;
            total = b + profitAmount;
            mon = Math.round(((total - d) / m) * 100) / 100;
        } else if (type === 'Debt') {
            total = b;
            mon = b - d;
            m = 1;
        } else {
            total = b;
            mon = 0;
            m = 1; 
        }

        document.getElementById('o-mon').innerText = "$" + (mon > 0 ? mon.toFixed(2) : 0);
        document.getElementById('o-total').innerText = "$" + total.toFixed(2);
        return { total, mon, b, d, m };
    }

    function saveSale() {
        let n = document.getElementById('i-name').value;
        let phone = document.getElementById('i-phone').value.trim();
        let wit = document.getElementById('i-witness').value;
        let witPhone = document.getElementById('i-witness-phone').value.trim();
        let iId = document.getElementById('i-item').value, nt = document.getElementById('i-note').value;
        let saleType = document.getElementById('i-sale-type').value;
        
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;

        if(!n || !iId) return;

        const phoneRegex = /^[0-9]{10,15}$/;
        if(!phoneRegex.test(phone)) { alert(l.invalid_phone || "Invalid Phone!"); return; }
        if(saleType === 'Installments' && !phoneRegex.test(witPhone)) { alert(l.invalid_phone || "Invalid Witness Phone!"); return; }

        let idx = inv.findIndex(x => x.id == iId || x.name == iId);
        if(idx === -1 || inv[idx].qty <= 0) { alert(l.out_of_stock || "Out of Stock!"); return; }

        let p = calc();
        let itemFullData = JSON.parse(JSON.stringify(inv[idx])); 
        
        let oldQty = inv[idx].qty;
        inv[idx].qty--;
        
        const now = new Date();
        const saleData = { 
            id:Date.now(), 
            name:n, phone: phone,
            customerDoc: currentDocBase64, 
            witness: (saleType === 'Cash' || saleType === 'Debt' ? 'N/A' : wit),
            witnessPhone: (saleType === 'Cash' || saleType === 'Debt' ? 'N/A' : witPhone),
            item: itemFullData.name, itemId: itemFullData.id, itemDetails: itemFullData, 
            total:p.total.toFixed(2), buy:p.b, cost: itemFullData.cost || 0, 
            down:p.d, mon:p.mon.toFixed(2), months:p.m, paid:0, 
            date: now.toLocaleString(),
            lastPaymentDate: Date.now(),
            timestamp: now.getTime(),
            note: nt, type: saleType,
            paymentsHistory: []
        };
        
        if(saleType === 'Cash') archive.unshift(saleData);
        else sales.unshift(saleData);

        updateDB((success) => {
            if(success) {
                ["i-name", "i-phone", "i-witness", "i-witness-phone", "i-note", "i-buy", "i-down"].forEach(id => document.getElementById(id).value = "");
                document.getElementById('doc-preview').style.display = 'none';
                currentDocBase64 = "";
                calc();
            } else {
                inv[idx].qty = oldQty;
                if(saleType === 'Cash') archive.shift();
                else sales.shift();
            }
        }); 
    }

    function pay(id) {
        if(prompt("KEY:") !== SECRET_KEY) return;
        let idx = sales.findIndex(x => x.id === id);
        if(idx !== -1) {
            let count = 1;
            let amountToPay = 0;
            
            if(sales[idx].type === 'Debt') {
                amountToPay = parseFloat(prompt("چەند پارەی ددەت؟ (Amount to pay?)", sales[idx].mon)) || 0;
                if(amountToPay <= 0) return;
                count = 1;
            } else {
                count = parseInt(prompt("چەند قیستان ددەت؟ (How many months?)", "1")) || 1;
                let available = sales[idx].months - sales[idx].paid;
                if(count > available) count = available;
                if(count <= 0) return;
                amountToPay = sales[idx].mon;
            }

            let oldSales = JSON.parse(JSON.stringify(sales));
            let oldArchive = JSON.parse(JSON.stringify(archive));
            let oldReports = JSON.parse(JSON.stringify(reports));

            const now = new Date();
            const payTime = now.toLocaleString();
            
            if(!sales[idx].paymentsHistory) sales[idx].paymentsHistory = [];

            let tempReports = [];
            if(sales[idx].type === 'Debt') {
                let currentDebt = parseFloat(sales[idx].mon);
                sales[idx].mon = (currentDebt - amountToPay).toFixed(2);
                sales[idx].paymentsHistory.push({ installmentNo: 'Debt Payment', amount: amountToPay.toFixed(2), date: payTime, collector: 'System Admin' });
                const rep = { ...sales[idx], payDate: payTime, mon: amountToPay.toFixed(2), currentPayment: 'Debt', remAmt: sales[idx].mon, remCount: 0, timestamp: Date.now() };
                reports.unshift(rep);
                tempReports.push(rep);
                if(parseFloat(sales[idx].mon) <= 0) { archive.unshift(sales[idx]); sales.splice(idx, 1); }
            } else {
                for(let i=0; i<count; i++) {
                    sales[idx].paid++;
                    sales[idx].paymentsHistory.push({ installmentNo: sales[idx].paid, amount: sales[idx].mon, date: payTime, collector: 'System Admin' });
                    const calculatedRemain = Math.max(0, (parseFloat(sales[idx].total) - parseFloat(sales[idx].down) - (parseFloat(sales[idx].mon) * sales[idx].paid))).toFixed(2);
                    const rep = { ...sales[idx], payDate: payTime, currentPayment: sales[idx].paid, remAmt: calculatedRemain, remCount: (sales[idx].months - sales[idx].paid), timestamp: Date.now() };
                    reports.unshift(rep);
                    tempReports.push(rep);
                }
                if(sales[idx].paid >= sales[idx].months) { archive.unshift(sales[idx]); sales.splice(idx, 1); }
            }
            
            if(idx !== -1 && sales[idx]) sales[idx].lastPaymentDate = now.getTime();

            updateDB((success) => {
                if(success) {
                    showReceiptPreview(tempReports[tempReports.length - 1]);
                } else { 
                    sales = oldSales; archive = oldArchive; reports = oldReports; render(); 
                }
            });
        }
    }

    function showLedger(id) {
        const sale = sales.find(x => x.id === id) || archive.find(x => x.id === id);
        if(!sale) return;
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;
        const history = sale.paymentsHistory || [];
        
        document.getElementById('modal-title').innerText = l.h_title || "Payment History";
        let html = `<div class="card" style="margin-bottom:15px; border-right: 5px solid var(--primary);">
            <b>${sale.name}</b><br><small>${sale.item} (${sale.type})</small>
            <div style="display:flex; justify-content:space-between; margin-top:10px;">
                <span>Total: $${sale.total}</span>
                <span>Down: $${sale.down}</span>
            </div>
            ${sale.customerDoc ? `<div style="margin-top:15px; text-align:center;"><p style="font-size:11px; font-weight:900;">CUSTOMER DOCUMENT</p><img src="${sale.customerDoc}" style="width:100%; max-height:200px; object-fit:contain; border-radius:10px; border:1px solid var(--border);"></div>` : ''}
        </div>`;
        
        if(history.length === 0) {
            html += `<p style="text-align:center; padding:20px;">No payments recorded yet.</p>`;
        } else {
            html += `<div class="history-list">`;
            history.forEach(p => {
                html += `
                <div class="history-item">
                    <div>
                        <b>${isNaN(p.installmentNo) ? p.installmentNo : 'Installment #' + p.installmentNo}</b><br>
                        <small><i class="fa-solid fa-calendar-day"></i> ${p.date}</small><br>
                        <small><i class="fa-solid fa-user-check"></i> ${p.collector || 'Admin'}</small>
                    </div>
                    <div style="font-weight:900; color:var(--success); font-size:1.1rem;">$${p.amount}</div>
                </div>`;
            });
            html += `</div>`;
        }
        
        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal-universal').style.display = 'flex';
    }

    function showReceiptPreview(rep) {
        const lang = document.getElementById('lang-sel').value;
        const l = translations[lang] || translations.bd;
        const isRtl = !['en','tr'].includes(lang);
        
        document.getElementById('modal-title').innerText = "Print Preview";
        let detailsHtml = "";
        const d = rep.itemDetails;
        if(d.type === "Mobile") detailsHtml = `${d.model} | ${d.storage}/${d.ram}GB`;
        else if(d.type === "Computer") detailsHtml = `${d.cpu} | RAM: ${d.ram}GB`;
        
        document.getElementById('modal-content').innerHTML = `
            <div class="receipt-preview" id="preview-box" style="direction: ${isRtl ? 'rtl' : 'ltr'};">
                <div style="text-align:center;">
                    <img src="https://i.postimg.cc/3WMQdH2P/17ABF58A-85E9-4C1A-B6DD-97977E81AA3C.jpg" style="width:80px; margin-bottom:10px;">
                    <h3>${l.rec_title}</h3><p>${rep.payDate}</p>
                </div>
                <hr style="margin:10px 0; border:0.5px dashed #000;">
                <p><b>${l.rec_cust}:</b> ${rep.name}</p>
                <p><b>${l.th2}:</b> ${rep.item} (${detailsHtml})</p>
                <p><b>${l.ltotal}:</b> $${rep.total}</p>

    function startGenericScanner(targetInputId) {
        if (activeScanner) { activeScanner.clear().catch(() => {}); activeScanner = null; }
        const content = document.getElementById('modal-content');
        const oldHtml = content.innerHTML;
        content.innerHTML = `
            <div id="reader-box"></div>

        `;
        const config = { 
            fps: 30, 
            qrbox: (viewWidth, viewHeight) => {
                let size = Math.min(viewWidth, viewHeight) * 0.7;
                return { width: size, height: size };
            },
            aspectRatio: 1.0,
            videoConstraints: { facingMode: "environment", focusMode: "continuous" }
        };
        activeScanner = new Html5QrcodeScanner("reader-box", config, false);
        activeScanner.render((text) => {
            document.getElementById(targetInputId).value = text;
            if(targetInputId === 'i-item') updateDetailsHint();
            stopAndResetScanner(targetInputId, oldHtml);
        });

    function render() {
        document.getElementById('v1').innerText = inv.reduce((a,b)=>a+parseInt(b.qty),0);
        let pro = 0, remTotal = 0, q = document.getElementById('search-input').value.toLowerCase();
        
        const processSaleProfit = (s) => {
            let totalVal = parseFloat(s.total) || 0;
            let costVal = parseFloat(s.cost) || 0;
            let downVal = parseFloat(s.down) || 0;
            let monVal = parseFloat(s.mon) || 0;
            let paidCount = parseInt(s.paid) || 0;
            let monthsVal = parseInt(s.months) || 1;
            
            if (s.type === 'Debt') {
                pro += (totalVal - costVal) * (downVal / totalVal); 
                remTotal += parseFloat(s.mon);
            } else if (totalVal > 0) {
                let saleProfit = totalVal - costVal;
                let currentCashIn = downVal + (monVal * paidCount);
                let currentProfitShare = (currentCashIn / totalVal) * saleProfit;
                pro += currentProfitShare;
                remTotal += (monVal * (monthsVal - paidCount));
            }
        };
        sales.forEach(processSaleProfit);
        archive.forEach(s => { pro += (parseFloat(s.total) - parseFloat(s.cost || 0)); });

        document.getElementById('v4').innerText = privacyHidden ? "****" : "$" + pro.toFixed(0);
        document.getElementById('v-annual').innerText = privacyHidden ? "****" : "$" + (pro * 1.6).toFixed(0);
        document.getElementById('v-rem').innerText = "$" + remTotal.toFixed(0);
        
        let sel = document.getElementById('i-item'); let curr = sel.value;
        sel.innerHTML = '<option value="">--- ITEM ---</option>';
        inv.forEach(x => { if(x.qty>0) sel.innerHTML += `<option value="${x.id}">${x.name} ($${x.cost})</option>`; });
        sel.value = curr;
        
        let list = document.getElementById('sales-list'); list.innerHTML = '';
        sales.filter(s => s.name.toLowerCase().includes(q) || s.item.toLowerCase().includes(q) || s.id.toString().includes(q)).forEach(s => {
            list.innerHTML += `<tr>
                <td><b>${s.name}</b><br><small style="color:${s.type==='Debt'?'var(--danger)':'var(--primary)'}">${s.type}</small></td>
                <td>${s.item}</td>

                <td>$${s.down}</td>
                <td>${s.type==='Debt'?'$'+s.mon:s.paid+'/'+s.months}</td>
                <td>
                    <button onclick="pay(${s.id})" class="btn-sm" style="background:var(--success);"><i class="fa-solid fa-receipt"></i></button>
                    <button onclick="showLedger(${s.id})" class="btn-sm" style="background:var(--primary);"><i class="fa-solid fa-clock-rotate-left"></i></button>
                    <button onclick="softDelete(${s.id})" class="btn-sm" style="background:var(--danger);"><i class="fa-solid fa-trash-can"></i></button>
                </td>
            </tr>`;
        });
    }

                <hr style="margin:20px 0; border:0.5px dashed var(--border);">
                <div class="details-grid" style="text-align:left;">
                    <div class="rep-stat"><small>From Down Payments</small><h3>$${totalDown.toFixed(2)}</h3></div>
                    <div class="rep-stat"><small>From Installments</small><h3>$${totalReceived.toFixed(2)}</h3></div>
                </div>
            </div>
        `;
        document.getElementById('modal-universal').style.display = 'flex';
        toggleMenu();
    }

    function printClosing() {
        const content = document.getElementById('closing-preview').innerHTML;
        const area = document.getElementById('print-area');
        area.innerHTML = `<div class="print-80mm" style="padding:10px;">${content}</div>`;
        setTimeout(() => { window.print(); }, 500);
    }

    function toggleLayout() { document.getElementById('app-container').classList.toggle('pc-mode-active'); toggleMenu(); }
    function toggleMenu() { document.getElementById('menu-overlay').classList.toggle('show'); }
    function delInv(id) { if(confirm("DELETE?")){inv = inv.filter(x => x.id !== id); updateDB(); showInventory();} }

    function softDelete(id) { 
        if(confirm("MOVE TO TRASH?") && prompt("KEY:")===SECRET_KEY){ 
            let idx = sales.findIndex(x => x.id === id);
            if(idx !== -1) {
                let saleItem = sales[idx];
                let invIdx = inv.findIndex(x => x.id == saleItem.itemId);
                let oldSales = [...sales], oldTrash = [...trash], oldQty = (invIdx !== -1) ? inv[invIdx].qty : null;
                if(invIdx !== -1) inv[invIdx].qty++; 
                trash.unshift(saleItem); sales.splice(idx, 1); 
                updateDB((success) => { if(!success) { sales = oldSales; trash = oldTrash; if(invIdx !== -1) inv[invIdx].qty = oldQty; render(); } }); 
            }
        } 
    }

    function showArchive() {
        const q = document.getElementById('search-input').value.toLowerCase();
        let filtered = archive.filter(x => x.name.toLowerCase().includes(q) || x.item.toLowerCase().includes(q));
        document.getElementById('modal-title').innerText="COMPLETED"; 
        document.getElementById('modal-content').innerHTML=`<div class="table-wrap"><table>
            <thead><tr><th>NAME</th><th>ITEM</th><th>TOTAL</th><th>LEDGER</th></tr></thead>
            <tbody>${filtered.map(x=>`<tr><td><b>${x.name}</b></td><td>${x.item}</td><td>$${x.total}</td><td><button onclick="showLedger(${x.id})" class="btn-sm" style="background:var(--primary);"><i class="fa-solid fa-clock-rotate-left"></i></button></td></tr>`).join('')}</tbody></table></div>`; 
        document.getElementById('modal-universal').style.display='flex'; toggleMenu(); 
    }

    function showRecycleBin() { 
        document.getElementById('modal-title').innerText="TRASH"; 
        document.getElementById('modal-content').innerHTML=`<div class="table-wrap"><table><tbody>${trash.map((x,idx)=>`<tr><td>${x.name}</td><td><button onclick="restore(${idx})" class="main-btn">RESTORE</button></td></tr>`).join('')}</tbody></table></div>`; 
        document.getElementById('modal-universal').style.display='flex'; toggleMenu(); 
    }
    
    function restore(idx) { 
        let restoredSale = trash[idx];
        let invIdx = inv.findIndex(x => x.id == restoredSale.itemId);
        if(invIdx !== -1) {
            let oldTrash = [...trash], oldSales = [...sales], oldQty = inv[invIdx].qty;
            inv[invIdx].qty--; sales.unshift(restoredSale); trash.splice(idx, 1); 
            updateDB((success) => { if(success) closeModal(); else { trash = oldTrash; sales = oldSales; inv[invIdx].qty = oldQty; } }); 
        } else alert("Item not found in inventory!");
    }

    function closeModal() { isInventoryOpen = false; if(activeScanner) { activeScanner.clear().then(() => { activeScanner = null; document.getElementById('modal-universal').style.display='none'; }).catch(() => { activeScanner = null; document.getElementById('modal-universal').style.display='none'; }); } else document.getElementById('modal-universal').style.display='none'; }
    function exportToExcel() { const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sales), "Sales"); XLSX.writeFile(wb, "POS_Backup.xlsx"); }
    function exportJSON() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({i:inv, s:sales, a:archive, t:trash, r:reports})); const dlAnchorElem = document.createElement('a'); dlAnchorElem.setAttribute("href", dataStr); dlAnchorElem.setAttribute("download", "POS_Backup_Full.json"); dlAnchorElem.click(); }
    function triggerRestore() { document.getElementById('restore-input').click(); }
    function restoreData(e) { const reader = new FileReader(); reader.onload = (ev) => { try { const d = JSON.parse(ev.target.result); inv=d.i||[]; sales=d.s||[]; archive=d.a||[]; trash=d.t||[]; reports=d.r||[]; updateDB(); alert("Success!"); location.reload(); } catch(e) { alert("Invalid File!"); } }; reader.readAsText(e.target.files[0]); }
    function showAbout() {
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;
        document.getElementById('modal-title').innerText = l.mabout;
        document.getElementById('modal-content').innerHTML = `<div style="text-align:center; padding:20px;"><img src="https://i.postimg.cc/nV1HLXWy/EFAC45A5-C196-48E5-913E-A27706778B90.jpg" style="width:120px; border-radius:50%; border:3px solid var(--neon-blue); margin-bottom:15px;"><h2 style="color:var(--neon-blue)">Bizhar Rasheed</h2><p>${l.dev_role}</p><p>${l.dev_msg}</p><a href="https://bizhar-cloud.github.io/BizharRasheed/" target="_blank" class="dev-link">${l.click_visit}</a></div>`;
        document.getElementById('modal-universal').style.display = 'flex'; toggleMenu();
    }
</script>
</body>
</html>
