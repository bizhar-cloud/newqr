<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIZHAR COMPUTER | PRO POS GLOBAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Orbitron:wght@600;900&display=swap');

        :root {
            --primary: #00f2ff;
            --bg: #05070a;
            --card: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg: #f4f7f6;
            --card: #ffffff;
            --text: #1a1a1a;
            --border: #ddd;
            --primary: #0072ff;
        }

        * { box-sizing: border-box; transition: 0.3s ease; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        .app-container { display: grid; grid-template-columns: 350px 1fr; min-height: 100vh; }

        /* Sidebar */
        .sidebar { background: var(--card); border-inline-end: 1px solid var(--border); padding: 25px; backdrop-filter: blur(15px); }
        .header-tools { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .tool-btn { background: var(--border); border: none; color: var(--text); padding: 10px; border-radius: 8px; cursor: pointer; }
        
        .brand { text-align: center; margin-bottom: 40px; }
        .brand h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 24px; margin: 0; }

        /* Input Styles */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.7; }
        input, select { width: 100%; padding: 12px; background: rgba(128,128,128,0.1); border: 1px solid var(--border); border-radius: 10px; color: var(--text); outline: none; }
        input:focus { border-color: var(--primary); }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-main { background: var(--primary); color: #000; }
        .btn-sec { background: transparent; border: 1px solid var(--border); color: var(--text); }

        /* Main Content */
        .main-content { padding: 30px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .stat-card h2 { color: var(--primary); font-family: 'Orbitron'; margin: 5px 0 0; }

        .table-box { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(128,128,128,0.1); padding: 15px; text-align: start; }
        td { padding: 15px; border-bottom: 1px solid var(--border); }

        /* Invoice Print */
        #print-area { display: none; padding: 50px; background: white; color: black; }
        @media print { body * { display: none !important; } #print-area { display: block !important; width: 100%; } }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 50px; }
    </style>
</head>
<body class="dark-mode" id="body-tag">

<div class="app-container">
    <div class="sidebar">
        <div class="header-tools">
            <button class="tool-btn" onclick="toggleMode()"><i id="mode-icon" class="fa-solid fa-sun"></i></button>
            <select id="lang-sel" class="tool-btn" onchange="updateLang()" style="width: auto;">
                <option value="ku">Kurdî</option>
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="fa">فارسی</option>
                <option value="tr">Türkçe</option>
            </select>
        </div>

        <div class="brand">
            <h1>BIZHAR COMPUTER</h1>
            <small style="letter-spacing: 2px; opacity: 0.5;">PREMIUM POS</small>
        </div>

        <div class="form-group">
            <label id="l-name">ناڤێ کڕیاری</label>
            <input type="text" id="cust-name" placeholder="...">
        </div>

        <div class="form-group">
            <label id="l-item">ئامێر</label>
            <select id="item-list"></select>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group">
                <label id="l-cost">بهایێ کڕینێ $</label>
                <input type="number" id="price-in" oninput="calc()">
            </div>
            <div class="form-group">
                <label id="l-down">پێشەکی $</label>
                <input type="number" id="down-in" oninput="calc()">
            </div>
        </div>

        <div class="form-group">
            <label id="l-months">ماوێ قیستێ (هەیڤ)</label>
            <select id="month-sel" onchange="calc()">
                <option value="6">6 Months (38%)</option>
                <option value="8">8 Months (45%)</option>
                <option value="12">12 Months (56%)</option>
                <option value="16">16 Months (75%)</option>
            </select>
        </div>

        <div style="background: rgba(0, 242, 255, 0.05); padding: 20px; border-radius: 12px; border-right: 4px solid var(--primary); margin-bottom: 20px;">
            <span style="font-size: 11px; opacity: 0.6;" id="l-monthly">هەیڤانە</span>
            <div id="monthly-out" style="font-size: 26px; font-weight: 900; color: var(--primary); font-family: 'Orbitron';">0.00 $</div>
        </div>

        <button class="btn btn-main" onclick="saveSale()" id="b-save"><i class="fa-solid fa-check"></i> تۆمارکرن</button>
        <button class="btn btn-sec" onclick="openAdmin()" id="b-admin"><i class="fa-solid fa-gears"></i> ڕێکخستن</button>
    </div>

    <div class="main-content">
        <div class="stats">
            <div class="stat-card"><span id="s1">مەخزەن</span><h2 id="inv-count">0</h2></div>
            <div class="stat-card"><span id="s2">کڕیار</span><h2 id="cust-count">0</h2></div>
            <div class="stat-card"><span id="s3">قەرز</span><h2 id="debt-total">0 $</h2></div>
            <div class="stat-card"><span id="s4">داهات</span><h2 id="inc-total">0 $</h2></div>
        </div>

        <div class="table-box">
            <table id="main-table">
                <thead>
                    <tr>
                        <th id="th1">کڕیار</th>
                        <th id="th2">ئامێر</th>
                        <th id="th3">گشتی</th>
                        <th id="th4">باقی</th>
                        <th id="th5">کردار</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="print-area">
    <h1 style="text-align:center;">BIZHAR COMPUTER</h1>
    <h3 style="text-align:center; border: 1px solid #000; padding: 5px;">وەصڵا قیستێ</h3>
    <br>
    <p><b>کڕیار:</b> <span id="p-name"></span></p>
    <p><b>ئامێر:</b> <span id="p-item"></span></p>
    <p><b>بهایێ گشتی:</b> <span id="p-total"></span> $</p>
    <p><b>هەیڤانە:</b> <span id="p-month"></span> $</p>
    <p><b>باقی:</b> <span id="p-rem"></span> $</p>
    <br><br>
    <div style="display:flex; justify-content: space-between;">
        <span>واژوویا کڕیاری: _________</span>
        <span>مۆر و واژوو: _________</span>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="stat-card" style="max-width: 500px; margin: auto; background: var(--bg);">
        <h2 id="ad-title">مەخزەن</h2>
        <input type="text" id="st-name" placeholder="Item Name">
        <input type="number" id="st-qty" placeholder="Qty">
        <button class="btn btn-main" onclick="addStock()">+ Add</button>
        <button class="btn btn-sec" onclick="exportXLS()">Export Excel</button>
        <button class="btn btn-sec" onclick="closeAdmin()">Close</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bizhar-pos-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let inventory = [], sales = [], lang = 'ku';

    const words = {
        ku: { name: "ناڤێ کڕیاری", item: "ئامێر", cost: "بهایێ کڕینێ $", down: "پێشەکی $", m: "ماوێ قیستێ", mon: "هەیڤانە", save: "تۆمارکرن", adm: "ڕێکخستن", s1: "مەخزەن", s2: "کڕیار", s3: "قەرز", s4: "داهات", th1: "کڕیار", th2: "ئامێر", th3: "گشتی", th4: "باقی", th5: "کردار" },
        ar: { name: "اسم الزبون", item: "الجهاز", cost: "سعر الشراء $", down: "المقدمة $", m: "مدة القسط", mon: "القسط الشهري", save: "تسجيل", adm: "الإعدادات", s1: "المخزن", s2: "الزبائن", s3: "الديون", s4: "الدخل", th1: "الزبون", th2: "الجهاز", th3: "المجموع", th4: "المتبقي", th5: "إجراء" },
        en: { name: "Customer Name", item: "Item", cost: "Cost Price $", down: "Down Payment $", m: "Months", mon: "Monthly", save: "Register", adm: "Settings", s1: "Stock", s2: "Customers", s3: "Debts", s4: "Income", th1: "Customer", th2: "Item", th3: "Total", th4: "Balance", th5: "Action" }
    };

    function updateLang() {
        lang = document.getElementById('lang-sel').value;
        const t = words[lang] || words.en;
        document.body.dir = (lang === 'en' || lang === 'tr') ? 'ltr' : 'rtl';
        document.getElementById('l-name').innerText = t.name;
        document.getElementById('l-item').innerText = t.item;
        document.getElementById('l-cost').innerText = t.cost;
        document.getElementById('l-down').innerText = t.down;
        document.getElementById('l-months').innerText = t.m;
        document.getElementById('l-monthly').innerText = t.mon;
        document.getElementById('b-save').innerText = t.save;
        document.getElementById('b-admin').innerText = t.adm;
        document.getElementById('s1').innerText = t.s1; document.getElementById('s2').innerText = t.s2;
        document.getElementById('s3').innerText = t.s3; document.getElementById('s4').innerText = t.s4;
        document.getElementById('th1').innerText = t.th1; document.getElementById('th2').innerText = t.th2;
        document.getElementById('th3').innerText = t.th3; document.getElementById('th4').innerText = t.th4;
        document.getElementById('th5').innerText = t.th5;
        ui();
    }

    function toggleMode() {
        document.getElementById('body-tag').classList.toggle('light-mode');
        const icon = document.getElementById('mode-icon');
        icon.className = icon.className.includes('sun') ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
    }

    db.ref('/').on('value', s => { const d = s.val(); if(d){ inventory=d.i||[]; sales=d.s||[]; ui(); } });

    function calc() {
        let p = parseFloat(document.getElementById('price-in').value)||0, d = parseFloat(document.getElementById('down-in').value)||0, m = parseInt(document.getElementById('month-sel').value);
        let r = {6:0.38, 8:0.45, 12:0.56, 16:0.75}[m];
        let total = p + (p*r), mon = (total - d)/m;
        document.getElementById('monthly-out').innerText = mon.toFixed(2) + " $";
        return { total, mon, d, m };
    }

    function saveSale() {
        let n = document.getElementById('cust-name').value, i = document.getElementById('item-list').value;
        if(!n || !i) return alert("Fill data!");
        let p = calc();
        let idx = inventory.findIndex(x => x.name === i);
        inventory[idx].qty--;
        sales.unshift({ id:Date.now(), name:n, item:i, total:p.total.toFixed(2), down:p.d.toFixed(2), mon:p.mon.toFixed(2), months:p.m, paid:0 });
        db.ref('/').set({ i: inventory, s: sales });
    }

    function ui() {
        document.getElementById('inv-count').innerText = inventory.reduce((a,b)=>a+b.qty,0);
        document.getElementById('cust-count').innerText = sales.length;
        let dbt=0, inc=0;
        sales.forEach(s => { 
            let p_v = parseFloat(s.down) + (s.paid * parseFloat(s.mon));
            inc += p_v; dbt += (parseFloat(s.total) - p_v);
        });
        document.getElementById('debt-total').innerText = dbt.toFixed(2)+" $";
        document.getElementById('inc-total').innerText = inc.toFixed(2)+" $";

        let sel = document.getElementById('item-list'), tb = document.getElementById('tbody');
        sel.innerHTML = ''; inventory.forEach(x => { if(x.qty>0) sel.innerHTML += `<option value="${x.name}">${x.name} (${x.qty})</option>`; });
        
        tb.innerHTML = '';
        sales.forEach(s => {
            let rem = (parseFloat(s.total) - parseFloat(s.down) - (s.paid * parseFloat(s.mon))).toFixed(2);
            tb.innerHTML += `<tr><td>${s.name}</td><td>${s.item}</td><td>${s.total}$</td><td>${rem}$</td>
            <td><button class="tool-btn" onclick="pay(${s.id})">+</button> <button class="tool-btn" onclick="printV(${s.id})"><i class="fa-solid fa-print"></i></button></td></tr>`;
        });
    }

    function pay(id) { let s=sales.find(x=>x.id===id); if(s.paid < s.months){ s.paid++; db.ref('/').set({i:inventory, s:sales}); } }

    function printV(id) {
        let s=sales.find(x=>x.id===id);
        let rem = (parseFloat(s.total) - parseFloat(s.down) - (s.paid * parseFloat(s.mon))).toFixed(2);
        document.getElementById('p-name').innerText = s.name;
        document.getElementById('p-item').innerText = s.item;
        document.getElementById('p-total').innerText = s.total;
        document.getElementById('p-month').innerText = s.mon;
        document.getElementById('p-rem').innerText = rem;
        window.print();
    }

    function openAdmin() { let p=prompt("Pass:"); if(p==="1234") document.getElementById('admin-modal').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display='none'; }
    function addStock() {
        let n=document.getElementById('st-name').value, q=parseInt(document.getElementById('st-qty').value);
        if(n&&q){ let f=inventory.find(x=>x.name===n); if(f) f.qty+=q; else inventory.push({name:n, qty:q}); db.ref('/').set({i:inventory, s:sales}); }
    }
    function exportXLS() { let ws=XLSX.utils.json_to_sheet(sales); let wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sales"); XLSX.writeFile(wb, "Report.xlsx"); }
</script>
</body>
</html>
