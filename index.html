<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIZHAR COMPUTER | PRO POS SYSTEM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --primary: #2563eb; 
            --neon-blue: #00d2ff; --neon-purple: #9d50bb; --border: #cbd5e1; --success: #10b981; --danger: #ef4444;
        }

        body.dark-mode {
            --bg: #050b18; --card: #111a2e; --text: #f1f5f9; --primary: #3b82f6; 
            --neon-blue: #00f2ff; --neon-purple: #bd00ff; --border: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); color: var(--text); transition: 0.4s ease; overflow-x: hidden; }

        /* NEON HEADER */
        header { 
            background: var(--card); height: 80px; padding: 0 20px; 
            border-bottom: 3px solid transparent;
            border-image: linear-gradient(to right, var(--neon-blue), var(--neon-purple)) 1;
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 20px rgba(0, 210, 255, 0.15);
        }

        .brand { 
            font-weight: 900; font-size: 20px; 
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        /* FIXED SETTINGS MENU */
        .settings-container { position: relative; }
        .settings-btn { 
            width: 48px; height: 48px; border-radius: 14px; 
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border: none; font-size: 22px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .dropdown-menu { 
            position: absolute; left: 0; top: 60px; background: var(--card); 
            border: 2px solid var(--neon-blue); border-radius: 20px; width: 250px; 
            display: none; flex-direction: column; padding: 12px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); z-index: 9999;
        }
        .dropdown-menu.show { display: flex !important; }

        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; 
            cursor: pointer; color: var(--text); font-size: 14px; border: none; background: none; width: 100%; text-align: right; font-weight: 700;
        }
        .menu-item:hover { background: rgba(0, 210, 255, 0.1); color: var(--neon-blue); }

        /* LAYOUT */
        .container { width: 100%; max-width: 1400px; margin: 25px auto; padding: 0 15px; }
        .pc-mode-active { display: grid !important; grid-template-columns: 400px 1fr !important; gap: 30px; align-items: start; }

        .card { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
        
        input, select { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 15px; background: var(--bg); color: var(--text); margin-top: 8px; outline: none; }
        input:focus { border-color: var(--neon-blue); }

        .main-btn { 
            width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 900; 
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white; margin-top: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 22px; text-align: center; border-bottom: 5px solid var(--neon-blue); }

        .table-wrap { background: var(--card); border-radius: 22px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 16px; border-bottom: 1px solid var(--border); text-align: right; }
        th { background: rgba(0, 210, 255, 0.05); color: var(--neon-blue); }
        tr.finished { background: rgba(16, 185, 129, 0.08); border-right: 6px solid var(--success); }

        .action-btns { display: flex; gap: 5px; justify-content: flex-end; }
        .btn-sm { width: 32px; height: 32px; border-radius: 8px; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 99999; backdrop-filter: blur(8px); }

        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body id="app-body">

<header>
    <div class="settings-container">
        <button class="settings-btn" onclick="toggleMenu()"><i class="fa-solid fa-ghost"></i></button>
        <div class="dropdown-menu" id="main-menu">
            <button class="menu-item" onclick="toggleLayout()"><i class="fa-solid fa-display"></i> <span id="m-pc">PC Mode</span></button>
            <button class="menu-item" onclick="toggleDark()"><i class="fa-solid fa-wand-magic-sparkles"></i> <span id="m-dark">Dark Mode</span></button>
            <button class="menu-item" onclick="exportData()"><i class="fa-solid fa-cloud-arrow-down"></i> <span id="m-backup">Backup</span></button>
            <button class="menu-item" onclick="showAddInv()"><i class="fa-solid fa-microchip"></i> <span id="m-add">Inventory</span></button>
            <hr style="opacity: 0.1; margin: 10px 0;">
            <div style="padding: 5px 12px;">
                <select id="lang-sel" onchange="applyLang()" style="border:1px solid var(--neon-blue); font-weight:900;">
                    <option value="ku">Kurdî ☀️</option>
                    <option value="ar">العربية 🌙</option>
                    <option value="fa">فارسی 💎</option>
                    <option value="tr">Türkçe 🛡️</option>
                    <option value="en">English 🌐</option>
                </select>
            </div>
        </div>
    </div>
    <div class="brand">BIZHAR COMPUTER</div>
    <div style="width:48px;"></div>
</header>

<div class="container" id="app-container">
    <div id="side-p">
        <div class="card">
            <h3 id="t-form" style="font-weight:900; color:var(--neon-blue);"><i class="fa-solid fa-bolt"></i> تۆمارکرن</h3>
            <div id="scanner" style="display:none; margin-top:10px;"></div>
            
            <label id="l-name" style="font-size:12px; font-weight:700; margin-top:10px; display:block;">ناڤێ کڕیاری</label>
            <input type="text" id="i-name" placeholder="...">

            <label id="l-item" style="font-size:12px; font-weight:700; margin-top:12px; display:block;">ئامێر</label>
            <div style="display:flex; gap:8px;"><select id="i-item"></select>
                <button onclick="startScan()" class="main-btn" style="margin:0; width:60px; height:50px;"><i class="fa-solid fa-qrcode"></i></button>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;">
                <div><label id="l-buy" style="font-size:11px;">کڕین $</label><input type="number" id="i-buy" oninput="calc()"></div>
                <div><label id="l-down" style="font-size:11px;">پێشەکی $</label><input type="number" id="i-down" oninput="calc()"></div>
            </div>

            <label id="l-duration" style="font-size:12px; font-weight:700; margin-top:15px; display:block;">ماوێ قیستێ</label>
            <select id="i-months" onchange="calc()">
                <option value="6">6 Months (40%)</option>
                <option value="12">12 Months (55%)</option>
                <option value="16">16 Months (75%)</option>
            </select>

            <div style="background:rgba(0, 210, 255, 0.05); padding:15px; border-radius:18px; margin-top:20px; text-align:center; border:2px dashed var(--neon-blue);">
                <small id="l-mon">قیستێ هەیڤانە</small>
                <div id="o-mon" style="font-weight:900; color:var(--neon-blue); font-size:28px;">$ 0.00</div>
            </div>

            <button class="main-btn" onclick="saveSale()"><i class="fa-solid fa-save"></i> <span id="b-save">پاشکەفتکرن</span></button>
        </div>
    </div>

    <div id="main-p">
        <div class="stats">
            <div class="stat-box" style="border-color: var(--neon-purple);"><small id="s1">مەخزەن</small><h3 id="v1">0</h3></div>
            <div class="stat-box" style="border-color: var(--success);"><small id="s4">قازانج</small><h3 id="v4" style="color:var(--success)">0$</h3></div>
        </div>
        <input type="text" id="search-input" placeholder="Search..." oninput="render()" style="margin-bottom:20px;">
        <div class="table-wrap">
            <table>
                <thead><tr>
                    <th id="th1">کڕیار</th>
                    <th id="th2">ئامێر</th>
                    <th id="th3">گشتی</th>
                    <th id="th_down">پێشەکی</th>
                    <th id="th4">قیست</th>
                    <th id="th5">کردار</th>
                </tr></thead>
                <tbody id="sales-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal" id="modal-inv">
    <div class="card" style="width:90%; max-width:400px; border:2px solid var(--neon-blue);">
        <h3 id="m-title">Inventory</h3>
        <input type="text" id="add-name" placeholder="Item Name"><input type="text" id="add-barcode" placeholder="Barcode"><input type="number" id="add-qty" placeholder="Qty">
        <button class="main-btn" onclick="addInv()">Confirm</button>
        <button class="main-btn" onclick="document.getElementById('modal-inv').style.display='none'" style="background:#475569;">Close</button>
    </div>
</div>

<div id="print-area" style="display:none; padding:40px; text-align:center; font-family:sans-serif;"></div>

<script>
    const firebaseConfig = { databaseURL: "https://bizhar-pos-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let inv = [], sales = [];

    const langs = {
        ku: { dir: "rtl", tform: "تۆمارکرن", lname: "ناڤێ کڕیاری", litem: "ئامێر", lbuy: "کڕین $", ldown: "پێشەکی $", lduration: "ماوێ قیستێ", lmon: "قیستێ هەیڤانە", bsave: "پاشکەفتکرن", s1: "مەخزەن", s4: "قازانج", th1: "کڕیار", th2: "ئامێر", th3: "گشتی", th_down: "پێشەکی", th4: "قیست", th5: "کردار", mpc: "مۆدێ کۆمپیوتەری", mdark: "مۆدێ تاریک", mbackup: "باکئەپ", madd: "مەخزەن", mtitle: "زێدەکرنا ئامێری" },
        ar: { dir: "rtl", tform: "تسجيل", lname: "اسم الزبون", litem: "الجهاز", lbuy: "شراء $", ldown: "مقدمة $", lduration: "المدة", lmon: "القسط", bsave: "حفظ", s1: "المخزن", s4: "الأرباح", th1: "الزبون", th2: "الجهاز", th3: "الإجمالي", th_down: "المقدمة", th4: "الأقساط", th5: "إجراء", mpc: "وضع الكمبيوتر", mdark: "الوضع الليلي", mbackup: "نسخة احتياطية", madd: "المخزن", mtitle: "إضافة جهاز" },
        fa: { dir: "rtl", tform: "ثبت", lname: "نام مشتری", litem: "دستگاه", lbuy: "خرید $", ldown: "پیش پرداخت $", lduration: "مدت", lmon: "قسط ماهانه", bsave: "ذخیره", s1: "انبار", s4: "سود", th1: "مشتری", th2: "دستگاه", th3: "کل", th_down: "بیعانه", th4: "قسط", th5: "عملیات", mpc: "حالت دسکتاپ", mdark: "حالت شب", mbackup: "پشتیبان", madd: "انبارداری", mtitle: "افزودن کالا" },
        tr: { dir: "ltr", tform: "Kayıt", lname: "Müşteri", litem: "Cihaz", lbuy: "Alış $", ldown: "Peşinat $", lduration: "Süre", lmon: "Aylık", bsave: "Kaydet", s1: "Stok", s4: "Kâr", th1: "Müşteri", th2: "Cihaz", th3: "Toplam", th_down: "Peşinat", th4: "Taksit", th5: "İşlem", mpc: "PC Modu", mdark: "Karanlık Mod", mbackup: "Yedekle", madd: "Stok", mtitle: "Cihaz Ekle" },
        en: { dir: "ltr", tform: "Register", lname: "Customer", litem: "Item", lbuy: "Buy $", ldown: "Down $", lduration: "Months", lmon: "Monthly", bsave: "Save", s1: "Stock", s4: "Profit", th1: "Name", th2: "Item", th3: "Total", th_down: "DownPay", th4: "Paid", th5: "Action", mpc: "PC Mode", mdark: "Dark Mode", mbackup: "Backup", madd: "Inventory", mtitle: "Add Item" }
    };

    function toggleMenu() { document.getElementById('main-menu').classList.toggle('show'); }
    function toggleLayout() { document.getElementById('app-container').classList.toggle('pc-mode-active'); toggleMenu(); }
    function toggleDark() { document.body.classList.toggle('dark-mode'); toggleMenu(); }
    function showAddInv() { document.getElementById('modal-inv').style.display='flex'; toggleMenu(); }

    window.onclick = function(e) { if (!e.target.closest('.settings-container')) document.getElementById('main-menu').classList.remove('show'); }

    db.ref('/').on('value', snap => { const d = snap.val(); if(d){ inv=d.i||[]; sales=d.s||[]; render(); } });

    function applyLang() {
        const l = langs[document.getElementById('lang-sel').value];
        document.body.dir = l.dir;
        document.getElementById('t-form').innerHTML = `<i class="fa-solid fa-bolt"></i> ${l.tform}`;
        document.getElementById('l-name').innerText = l.lname; document.getElementById('l-item').innerText = l.litem;
        document.getElementById('l-buy').innerText = l.lbuy; document.getElementById('l-down').innerText = l.ldown;
        document.getElementById('l-duration').innerText = l.lduration; document.getElementById('l-mon').innerText = l.lmon;
        document.getElementById('b-save').innerText = l.bsave; document.getElementById('s1').innerText = l.s1;
        document.getElementById('s4').innerText = l.s4; document.getElementById('th1').innerText = l.th1;
        document.getElementById('th2').innerText = l.th2; document.getElementById('th3').innerText = l.th3;
        document.getElementById('th_down').innerText = l.th_down;
        document.getElementById('th4').innerText = l.th4; document.getElementById('th5').innerText = l.th5;
        document.getElementById('m-pc').innerText = l.mpc; document.getElementById('m-dark').innerText = l.mdark;
        document.getElementById('m-backup').innerText = l.mbackup; document.getElementById('m-add').innerText = l.madd;
        document.getElementById('m-title').innerText = l.mtitle;
        render();
    }

    function calc() {
        let b = parseFloat(document.getElementById('i-buy').value)||0, d = parseFloat(document.getElementById('i-down').value)||0, m = parseInt(document.getElementById('i-months').value);
        let rates = {6:0.4, 12:0.55, 16:0.75};
        let total = b + (b * (rates[m]||0.4)), mon = (total - d) / m;
        document.getElementById('o-mon').innerText = "$ " + mon.toFixed(2);
        return { total, mon, b, d, m };
    }

    function saveSale() {
        let n = document.getElementById('i-name').value, i = document.getElementById('i-item').value;
        if(!n || !i) return alert("Pire bike!");
        let p = calc(), idx = inv.findIndex(x => x.name === i);
        if(idx!==-1) inv[idx].qty--;
        sales.unshift({ id:Date.now(), name:n, item:i, total:p.total.toFixed(2), buy:p.b, down:p.d, mon:p.mon.toFixed(2), months:p.m, paid:0, date:new Date().toLocaleDateString() });
        db.ref('/').set({ i: inv, s: sales });
        document.getElementById('i-name').value = "";
    }

    function addInv() {
        let n = document.getElementById('add-name').value, b = document.getElementById('add-barcode').value, q = parseInt(document.getElementById('add-qty').value);
        if(n && q){ inv.push({name:n, barcode:b, qty:q}); db.ref('/').set({i:inv, s:sales}); document.getElementById('modal-inv').style.display='none'; }
    }

    function render() {
        document.getElementById('v1').innerText = inv.reduce((a,b)=>a+b.qty,0);
        let pro=0, query = document.getElementById('search-input').value.toLowerCase();
        sales.forEach(s => { pro += (parseFloat(s.total) - parseFloat(s.buy)); });
        document.getElementById('v4').innerText = pro.toFixed(0) + "$";
        let sel = document.getElementById('i-item'), list = document.getElementById('sales-list');
        sel.innerHTML = '<option value="">...</option>';
        inv.forEach(x => { if(x.qty>0) sel.innerHTML += `<option value="${x.name}">${x.name}</option>`; });
        list.innerHTML = '';
        sales.filter(s => s.name.toLowerCase().includes(query)).forEach(s => {
            let isDone = s.paid >= s.months;
            list.innerHTML += `<tr class="${isDone?'finished':''}">
                <td><b>${s.name}</b><br><small>${s.date}</small></td>
                <td>${s.item}</td>
                <td>${s.total}$</td>
                <td>${s.down}$</td>
                <td>${s.paid}/${s.months}</td>
                <td class="action-btns">
                    <button onclick="pay(${s.id})" class="btn-sm" style="background:var(--primary)">+</button>
                    <button onclick="printSale(${s.id})" class="btn-sm" style="background:var(--neon-purple)"><i class="fa-solid fa-print"></i></button>
                    <button onclick="delS(${s.id})" class="btn-sm" style="background:var(--danger)">×</button>
                </td>
            </tr>`;
        });
    }

    function pay(id) { let s=sales.find(x=>x.id===id); if(s.paid < s.months){ s.paid++; db.ref('/').set({i:inv, s:sales}); } }
    function delS(id) { if(confirm("Tu pişrasti؟")){ sales=sales.filter(x=>x.id!==id); db.ref('/').set({i:inv, s:sales}); } }
    
    function printSale(id) {
        let s = sales.find(x => x.id === id);
        let p = document.getElementById('print-area');
        p.innerHTML = `
            <h2 style="color:#2563eb">BIZHAR COMPUTER</h2>
            <p>Customer: ${s.name}</p>
            <p>Item: ${s.item}</p><hr>
            <p>Total Price: ${s.total}$</p>
            <p>Down Payment: ${s.down}$</p>
            <p>Monthly: ${s.mon}$ x ${s.months} Months</p>
            <p>Date: ${s.date}</p>
            <br><p>Thank you for choosing us!</p>
        `;
        window.print();
    }

    function exportData() {
        let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({i:inv, s:sales}));
        let dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "BIZHAR_BACKUP.json"); dl.click();
    }
    
    function startScan() {
        document.getElementById('scanner').style.display = 'block';
        let sc = new Html5QrcodeScanner("scanner", { fps: 15, qrbox: 250 });
        sc.render((txt) => {
            let f = inv.find(x => x.barcode === txt);
            if(f) { document.getElementById('i-item').value = f.name; sc.clear(); document.getElementById('scanner').style.display='none'; }
        });
    }
    applyLang();
</script>
</body>
</html>
