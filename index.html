<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Installments POS - ELITE V8.6</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/3WMQdH2P/17ABF58A-85E9-4C1A-B6DD-97977E81AA3C.jpg">
    <link rel="icon" href="https://i.postimg.cc/3WMQdH2P/17ABF58A-85E9-4C1A-B6DD-97977E81AA3C.jpg">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Roboto:wght@400;700&display=swap');

        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --primary: #2563eb; 
            --neon-blue: #00d2ff; --neon-purple: #bd00ff; --border: #cbd5e1; --success: #10b981; --danger: #ef4444;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body.dark-mode {
            --bg: #020617; --card: #0f172a; --text: #f1f5f9; --primary: #3b82f6; 
            --neon-blue: #00f2ff; --neon-purple: #df00ff; --border: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans Arabic', 'Roboto', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }

        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 999999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .login-box { background: var(--card); padding: 40px; border-radius: 30px; border: 2px solid var(--neon-blue); width: 350px; text-align: center; box-shadow: 0 0 50px rgba(0,210,255,0.2); }

        header { 
            background: var(--card); height: 80px; padding: 0 20px; 
            border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .brand h2 { font-weight: 900; background: linear-gradient(135deg, #00d2ff, #bd00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .settings-btn, .notif-btn { width: 45px; height: 45px; border-radius: 12px; background: var(--bg); color: var(--neon-blue); display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--neon-blue); cursor: pointer; position: relative; }
        
        .notif-btn.active { color: var(--danger); border-color: var(--danger); animation: bell-ring 0.5s infinite; }
        @keyframes bell-ring {
            0%, 100% { transform: rotate(0); }
            20% { transform: rotate(15deg); }
            40% { transform: rotate(-15deg); }
            60% { transform: rotate(10deg); }
            80% { transform: rotate(-10deg); }
        }
        .notif-count { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid var(--card); }

        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .menu-overlay.show { display: flex; }
        .dropdown-menu { background: var(--card); border-radius: 30px; width: 340px; padding: 25px; border: 2px solid var(--neon-blue); max-height: 90vh; overflow-y: auto; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 16px; border-radius: 18px; cursor: pointer; color: var(--text); border: none; background: none; width: 100%; font-weight: 700; transition: 0.2s; margin-bottom: 8px; }
        .menu-item i { width: 25px; color: var(--neon-blue); text-align: center; }
        .menu-item:hover { background: var(--bg); border-right: 5px solid var(--neon-blue); }

        #lang-sel { 
            width: 100%; height: 55px; border: 2px solid var(--neon-blue); border-radius: 18px; margin-top: 15px; 
            font-weight: bold; background: var(--card); color: var(--text); padding: 0 15px; text-align: right; appearance: none;
            background-repeat: no-repeat; background-position: left 15px center;
        }
        body[dir="ltr"] #lang-sel { text-align: left; background-position: right 15px center; }

        .container { width: 100%; max-width: 1400px; margin: 25px auto; padding: 0 15px; }
        .pc-mode-active { display: grid !important; grid-template-columns: 420px 1fr !important; gap: 30px; }
        
        .card { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: var(--shadow); }
        input, select, textarea { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 15px; background: var(--bg); color: var(--text); margin-top: 8px; outline: none; font-size: 16px; font-family: inherit; }

        .main-btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 900; background: linear-gradient(45deg, var(--primary), var(--neon-blue)); color: white; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .table-wrap { background: var(--card); border-radius: 25px; overflow-x: auto; border: 1.5px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th { background: var(--bg); padding: 18px; color: var(--primary); font-weight: 900; font-size: 13px; text-align: center; }
        td { padding: 18px; border-bottom: 1px solid var(--border); text-align: center; font-weight: 600; }

        .btn-sm { width: 40px; height: 40px; border-radius: 12px; border: none; color: white; cursor: pointer; margin: 3px; }
        .privacy-toggle { cursor: pointer; font-size: 18px; margin-left: 8px; color: var(--primary); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1.5px solid var(--border); text-align: center; position: relative; }
        .stat-card h3 { font-size: 24px; font-weight: 900; margin-top: 5px; }
        .stat-card small { color: #64748b; font-weight: 700; font-size: 11px; display: block; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 99999; backdrop-filter: blur(12px); }
        .modal-card { background: var(--card); border-radius: 35px; padding: 30px; border: 2px solid var(--neon-blue); width: 95%; max-width: 850px; max-height: 90vh; overflow-y: auto; }

        #qr-reader-container { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid var(--neon-blue); margin-bottom: 15px; display: none; }
        .scan-action-btn { background: #6366f1; color: white; padding: 12px; border-radius: 12px; border: none; cursor: pointer; transition: 0.3s; }
        
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

        .report-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .rep-sum-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .rep-stat { background: var(--bg); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }

        #print-area { display: none; }
        @media print {
            @page { margin: 0; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                display: block !important; 
                position: absolute; left: 0; top: 0; 
                width: 76mm; padding: 4mm; 
                background: white; color: black; 
                font-family: 'Noto Sans Arabic', sans-serif;
                font-size: 10pt; line-height: 1.4;
            }
            .thermal-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 3mm; margin-bottom: 3mm; }
            .thermal-logo { width: 45mm; height: auto; margin-bottom: 2mm; filter: grayscale(1); }
            .thermal-row { display: flex; justify-content: space-between; margin-bottom: 2mm; border-bottom: 0.1mm solid #eee; }
            .thermal-row b { font-weight: 900; }
            .thermal-footer { text-align: center; border-top: 1px dashed #000; padding-top: 3mm; margin-top: 4mm; font-size: 9pt; }
            .receipt-title { font-weight: 900; border: 1px solid #000; padding: 1.5mm 3mm; display: inline-block; margin-bottom: 3mm; font-size: 11pt; border-radius: 2mm; }
            #qr-code-final { margin: 4mm auto; display: block; }
            .thermal-item-box { background: #f9f9f9; padding: 2mm; border-radius: 1mm; margin: 2mm 0; }
        }

        .dev-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white !important;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            transition: 0.3s;
        }
        .dev-link:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }

        .notif-item { background: var(--bg); padding: 15px; border-radius: 15px; border: 1.5px solid var(--border); margin-bottom: 10px; position: relative; }
        .notif-item b { color: var(--danger); display: block; }
        .notif-item span { font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <img src="https://i.postimg.cc/nV1HLXWy/EFAC45A5-C196-48E5-913E-A27706778B90.jpg" style="width: 100%; border-radius: 20px; margin-bottom: 20px;">
        <h2 style="color:var(--neon-blue); margin-bottom:20px; font-weight: 900;">Installments POS</h2>
        <input type="text" id="login-user" placeholder="USERNAME">
        <input type="password" id="login-pass" placeholder="PASSWORD">
        <button class="main-btn" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<header>
    <div class="header-actions">
        <button class="notif-btn" id="notif-bell" onclick="showNotifs()">
            <i class="fa-solid fa-bell"></i>
            <div id="notif-badge" class="notif-count" style="display:none">0</div>
        </button>
    </div>
    <div class="brand"><h2>Installments POS</h2></div>
    <div class="header-actions">
        <button class="settings-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></button>
    </div>
</header>

<div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()">
    <div class="dropdown-menu" onclick="event.stopPropagation()">
        <h4 id="m-header" style="text-align:center; color:var(--neon-blue); margin-bottom:20px; font-weight: 900;">MENU</h4>
        <button class="menu-item" onclick="toggleLayout()"><i class="fa-solid fa-display"></i> <span id="m-pc">PC Mode</span></button>
        <button class="menu-item" onclick="toggleDark()"><i id="mode-icon" class="fa-solid fa-moon"></i> <span id="m-dark">Dark Mode</span></button>
        <button class="menu-item" onclick="showReports('daily')"><i class="fa-solid fa-chart-line"></i> <span id="m-reports">Reports</span></button>
        <button class="menu-item" onclick="showArchive()"><i class="fa-solid fa-folder-open"></i> <span id="m-archive">Archive</span></button>
        <button class="menu-item" onclick="showRecycleBin()"><i class="fa-solid fa-trash-can"></i> <span id="m-trash">Recycle Bin</span></button>
        <button class="menu-item" onclick="checkInvPass()"><i class="fa-solid fa-boxes-stacked"></i> <span id="m-add">Inventory</span></button>
        <hr style="border: 0.5px solid var(--border); margin: 15px 0;">
        <button class="menu-item" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> <span id="m-backup">Export Excel</span></button>
        <button class="menu-item" onclick="triggerRestore()"><i class="fa-solid fa-cloud-arrow-up"></i> <span id="m-restore">Restore Data</span></button>
        <input type="file" id="restore-input" style="display:none" accept=".json" onchange="restoreData(event)">
        <button class="menu-item" onclick="showAbout()"><i class="fa-solid fa-user-gear"></i> <span id="m-about">Developer</span></button>
        
        <select id="lang-sel" onchange="applyLang()">
            <option value="bd">کوردی (بادینی)</option>
            <option value="sr">کوردی (سۆرانی)</option>
            <option value="ar">العربية (Arabic)</option>
            <option value="en">English (US)</option>
            <option value="tr">Türkçe (Turkish)</option>
            <option value="fa">فارسی (Persian)</option>
        </select>
        
        <button class="menu-item" onclick="logout()" style="color:var(--danger); margin-top: 15px;"><i class="fa-solid fa-power-off"></i> <span id="m-logout">Logout</span></button>
        <button class="main-btn" onclick="toggleMenu()" id="btn-close" style="background:#475569; margin-top: 20px;">CLOSE</button>
    </div>
</div>

<div class="container" id="app-container">
    <div id="side-p">
        <div class="card" style="border-top: 6px solid var(--primary);">
            <h3 id="t-form" style="font-weight: 900; color: var(--primary);"><i class="fa-solid fa-cart-plus"></i> NEW SALE</h3>
            
            <label id="l-sale-type" style="font-weight: 700; margin-top: 15px; display: block;">SALE TYPE</label>
            <select id="i-sale-type" onchange="toggleSaleMode()">
                <option value="Installments">Installments (بقیست)</option>
                <option value="Cash">Cash (کاش)</option>
            </select>

            <label id="l-name" style="font-weight: 700; margin-top: 15px; display: block;">CUSTOMER NAME</label>
            <input type="text" id="i-name" placeholder="...">

            <label id="l-phone" style="font-weight: 700; margin-top: 15px; display: block;">CUSTOMER PHONE</label>
            <input type="tel" id="i-phone" placeholder="0750 xxx xxxx">

            <div id="witness-section">
                <label id="l-witness" style="font-weight: 700; margin-top: 15px; display: block;">WITNESS NAME</label>
                <input type="text" id="i-witness" placeholder="...">

                <label id="l-witness-phone" style="font-weight: 700; margin-top: 15px; display: block;">WITNESS PHONE</label>
                <input type="tel" id="i-witness-phone" placeholder="0750 xxx xxxx">
            </div>

            <label id="l-item" style="margin-top:20px; display:block; font-weight: 700;">ITEM</label>
            <div style="display: flex; gap: 8px;">
                <select id="i-item" style="flex: 1;" onchange="updateDetailsHint()"></select>
                <button onclick="scanForSale()" class="scan-action-btn" style="margin-top: 8px;"><i class="fa-solid fa-qrcode"></i></button>
            </div>
            <div id="item-details-hint" style="font-size: 11px; color: var(--primary); margin-top: 5px; font-weight: bold;"></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px;">
                <div><label id="l-buy" style="font-weight: 700;">SALES PRICE $</label><input type="number" id="i-buy" oninput="calc()" placeholder="0.00"></div>
                <div id="down-pay-section">
                    <label id="l-down" style="font-weight: 700;">DOWN PAY $</label>
                    <input type="number" id="i-down" oninput="calc()" placeholder="0.00">
                </div>
            </div>

            <div id="installments-details-section">
                <label id="l-duration" style="margin-top:20px; display:block; font-weight: 700;">PLAN</label>
                <select id="i-months" onchange="toggleOtherPlan(); calc();">
                    <option value="2">2 Months (15%)</option>
                    <option value="3">3 Months (25%)</option>
                    <option value="4">4 Months (35%)</option>
                    <option value="6">6 Months (40%)</option>
                    <option value="8">8 Months (50%)</option>
                    <option value="10">10 Months (60%)</option>
                    <option value="12">12 Months (70%)</option>
                    <option value="16">16 Months (85%)</option>
                    <option value="Other">Other (دەستکاری قازانجی بکە)</option>
                </select>

                <div id="other-plan-section" style="display:none; margin-top:10px;">
                    <label id="l-other-rate" style="font-weight:700;">CUSTOM RATE %</label>
                    <input type="number" id="i-other-rate" oninput="calc()" placeholder="Ex: 20">
                    <label id="l-other-months" style="font-weight:700; margin-top:10px; display:block;">CUSTOM MONTHS</label>
                    <input type="number" id="i-other-months" oninput="calc()" placeholder="Ex: 5">
                </div>
            </div>

            <label id="l-note-title" style="margin-top:20px; display:block; font-weight: 700;">NOTES</label>
            <textarea id="i-note" rows="2"></textarea>

            <div style="display:flex; justify-content:space-between; margin-top:25px; background:var(--bg); padding:20px; border-radius:20px; border:2px dashed var(--neon-blue);">
                <div style="text-align:center;"><small id="l-total-box" style="color:#64748b;">TOTAL</small><div id="o-total" style="font-weight:900; font-size:24px;">$0</div></div>
                <div id="monthly-output-section" style="text-align:center;"><small id="l-mon" style="color:#64748b;">MONTHLY</small><div id="o-mon" style="font-weight:900; color:var(--primary); font-size:24px;">$0</div></div>
            </div>
            <button class="main-btn" onclick="saveSale()"><i class="fa-solid fa-floppy-disk"></i> <span id="b-save">SAVE</span></button>
        </div>
    </div>

    <div id="main-p">
        <div class="stats-grid">
            <div class="stat-card" style="border-bottom: 5px solid var(--neon-blue);">
                <small id="s1">STOCK</small><h3 id="v1" style="color:var(--neon-blue)">0</h3>
            </div>
            <div class="stat-card" style="border-bottom: 5px solid var(--success);">
                <small id="s4">PROFIT <i class="fa-solid fa-eye privacy-toggle" onclick="togglePrivacy()"></i></small>
                <h3 id="v4" style="color:var(--success)">****</h3>
            </div>
            <div class="stat-card" style="border-bottom: 5px solid var(--neon-purple);">
                <small id="s-rem">OUTSTANDING</small><h3 id="v-rem" style="color:var(--neon-purple)">$0</h3>
            </div>
            <div class="stat-card" style="border-bottom: 5px solid #f59e0b;">
                <small id="s-annual">YEARLY FORECAST</small><h3 id="v-annual" style="color:#f59e0b">****</h3>
            </div>
        </div>
        <input type="text" id="search-input" placeholder="..." oninput="render()" style="margin-bottom:20px; border: 2px solid var(--border);">
        <div class="table-wrap">
            <table>
                <thead><tr><th id="th1">CUSTOMER</th><th id="th2">ITEM</th><th id="th3">TOTAL</th><th id="th_down">DOWN</th><th id="th4">PAID</th><th id="th5">ACTION</th></tr></thead>
                <tbody id="sales-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal" id="modal-universal">
    <div class="modal-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 id="modal-title" style="color:var(--neon-blue); font-weight: 900;">TITLE</h2>
            <button onclick="closeModal()" style="background:var(--danger); border:none; color:white; width: 40px; height: 40px; border-radius: 50%; cursor:pointer;">&times;</button>
        </div>
        <div id="modal-content"></div>
    </div>
</div>

<div id="print-area"></div>

<script>
    const firebaseConfig = { databaseURL: "https://bizhar-pos-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let inv = [], sales = [], archive = [], trash = [], reports = [], privacyHidden = true;
    const SECRET_KEY = "07503644666";

    function toggleSaleMode() {
        const type = document.getElementById('i-sale-type').value;
        const instSection = document.getElementById('installments-details-section');
        const witnessSection = document.getElementById('witness-section');
        const monthlySection = document.getElementById('monthly-output-section');
        const downSection = document.getElementById('down-pay-section');
        
        if (type === 'Cash') {
            instSection.style.display = 'none';
            witnessSection.style.display = 'none';
            monthlySection.style.visibility = 'hidden';
            downSection.style.visibility = 'hidden';
            document.getElementById('i-down').value = 0;
        } else {
            instSection.style.display = 'block';
            witnessSection.style.display = 'block';
            monthlySection.style.visibility = 'visible';
            downSection.style.visibility = 'visible';
        }
        calc();
    }

    function toggleOtherPlan() {
        const val = document.getElementById('i-months').value;
        document.getElementById('other-plan-section').style.display = (val === 'Other') ? 'block' : 'none';
    }

    function calc() {
        const type = document.getElementById('i-sale-type').value;
        let b = parseFloat(document.getElementById('i-buy').value)||0;
        let d = parseFloat(document.getElementById('i-down').value)||0;
        let total = b;
        let mon = 0;
        let m = 0;

        if (type === 'Installments') {
            let selectedPlan = document.getElementById('i-months').value;
            let rate = 0;
            
            if (selectedPlan === 'Other') {
                rate = (parseFloat(document.getElementById('i-other-rate').value)||0) / 100;
                m = parseInt(document.getElementById('i-other-months').value)||1;
            } else {
                let rates = {2:0.15, 3:0.25, 4:0.35, 6:0.40, 8:0.50, 10:0.60, 12:0.70, 16:0.85};
                m = parseInt(selectedPlan);
                rate = rates[m] || 0;
            }
            
            total = b + (b * rate);
            mon = (total - d) / m;
        } else {
            total = b;
            mon = 0;
            m = 1; 
        }

        document.getElementById('o-mon').innerText = "$" + (mon > 0 ? mon.toFixed(2) : 0);
        document.getElementById('o-total').innerText = "$" + total.toFixed(2);
        return { total, mon, b, d, m };
    }

    function saveSale() {
        let n = document.getElementById('i-name').value;
        let phone = document.getElementById('i-phone').value;
        let wit = document.getElementById('i-witness').value;
        let witPhone = document.getElementById('i-witness-phone').value;
        let iName = document.getElementById('i-item').value, nt = document.getElementById('i-note').value;
        let saleType = document.getElementById('i-sale-type').value;
        
        if(!n || !iName) return;
        let p = calc(), idx = inv.findIndex(x => x.name === iName);
        let itemFullData = {};
        if(idx!==-1) {
            inv[idx].qty--;
            itemFullData = {...inv[idx]};
        }
        
        const now = new Date();
        const saleData = { 
            id:Date.now(), 
            name:n, 
            phone: phone,
            witness: (saleType === 'Cash' ? 'N/A' : wit),
            witnessPhone: (saleType === 'Cash' ? 'N/A' : witPhone),
            item:iName, 
            itemDetails: itemFullData,
            total:p.total.toFixed(2), 
            buy:p.b, 
            down:p.d, 
            mon:p.mon.toFixed(2), 
            months:p.m, 
            paid:(saleType === 'Cash' ? p.m : 0), 
            date: now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            lastPaymentDate: Date.now(), // Track for notifications
            note: nt,
            type: saleType
        };
        
        if(saleType === 'Cash') {
            archive.unshift(saleData);
        } else {
            sales.unshift(saleData);
        }

        updateDB(); 
        document.getElementById('i-name').value = ""; 
        document.getElementById('i-phone').value = ""; 
        document.getElementById('i-witness').value = ""; 
        document.getElementById('i-witness-phone').value = ""; 
        document.getElementById('i-note').value = "";
        document.getElementById('i-buy').value = "";
        document.getElementById('i-down').value = "";
        calc();
    }

    function pay(id) {
        if(prompt("KEY:") !== SECRET_KEY) return;
        let idx = sales.findIndex(x => x.id === id);
        if(idx !== -1) {
            sales[idx].paid++;
            const now = new Date();
            sales[idx].lastPaymentDate = now.getTime(); // Update date
            const payTime = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const remCount = (sales[idx].months - sales[idx].paid);
            const rep = { 
                ...sales[idx], 
                payDate: payTime, 
                currentPayment: sales[idx].paid, 
                remAmt: (remCount * parseFloat(sales[idx].mon)).toFixed(2),
                remCount: remCount,
                timestamp: Date.now()
            };
            
            reports.unshift(rep);
            printThermal(rep);
            if(sales[idx].paid >= sales[idx].months) { archive.unshift(sales[idx]); sales.splice(idx, 1); }
            updateDB();
        }
    }

    // --- Notification Logic ---
    function checkInstallmentsNotif() {
        const now = Date.now();
        const dueDays = 27;
        const dueMillis = dueDays * 24 * 60 * 60 * 1000;
        let count = 0;

        sales.forEach(s => {
            if(s.type === 'Installments' && (now - s.lastPaymentDate) >= dueMillis) {
                count++;
            }
        });

        const bell = document.getElementById('notif-bell');
        const badge = document.getElementById('notif-badge');
        if(count > 0) {
            bell.classList.add('active');
            badge.style.display = 'flex';
            badge.innerText = count;
        } else {
            bell.classList.remove('active');
            badge.style.display = 'none';
        }
    }

    function showNotifs() {
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;
        const now = Date.now();
        const dueMillis = 27 * 24 * 60 * 60 * 1000;
        
        let html = '';
        sales.forEach(s => {
            if(s.type === 'Installments' && (now - s.lastPaymentDate) >= dueMillis) {
                html += `
                <div class="notif-item">
                    <b>${s.name}</b>
                    <span>${s.item} - ${l.notif_msg}</span>
                    <p style="font-size:10px; margin-top:5px;">Last pay: ${new Date(s.lastPaymentDate).toLocaleDateString()}</p>
                </div>`;
            }
        });

        document.getElementById('modal-title').innerText = l.notif_title;
        document.getElementById('modal-content').innerHTML = html || `<p style="text-align:center; padding:20px;">No Alerts.</p>`;
        document.getElementById('modal-universal').style.display = 'flex';
    }

                <div class="thermal-row"><span>${l.lmon}:</span><b>$${data.mon}</b></div>

        });

        setTimeout(() => { window.print(); }, 600);
    }

    function showInventory() {
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;
        document.getElementById('modal-title').innerText = l.madd;
        document.getElementById('modal-content').innerHTML = `
        <div class="card" style="padding:15px; margin-bottom:15px;">
            <select id="inv-type" onchange="toggleInvFields()">
                <option value="Mobile">Mobile (مۆبایل)</option>
                <option value="Computer">Computer (کۆمپیوتەر)</option>
                <option value="Other">${l.other}</option>
            </select>
            
            <div style="display: flex; gap: 8px;">
                <input type="text" id="add-n" placeholder="${l.inv_name}" style="flex:1;">
                <button onclick="scanForInv()" class="scan-action-btn" style="margin-top: 8px;"><i class="fa-solid fa-barcode"></i></button>
            </div>
            
            <div id="mobile-fields" class="details-grid">
                <input type="text" id="m-model" placeholder="Model">
                <input type="text" id="m-color" placeholder="Color">
                <input type="number" id="m-storage" placeholder="Storage GB">
                <input type="number" id="m-ram" placeholder="RAM GB">
                <select id="m-condition"><option value="New">New</option><option value="Used">Used</option></select>
            </div>

            <div id="pc-fields" class="details-grid" style="display:none;">
                <select id="p-cpu">
                    <option value="Core i3">Core i3</option><option value="Core i5">Core i5</option>
                    <option value="Core i7">Core i7</option><option value="Core i9">Core i9</option>
                    <option value="Core Ultra 5">Core Ultra 5</option><option value="Core Ultra 7">Core Ultra 7</option>
                    <option value="Core Ultra 9">Core Ultra 9</option>
                    <option value="AMD Ryzen 3">AMD Ryzen 3</option><option value="AMD Ryzen 5">AMD Ryzen 5</option>
                    <option value="AMD Ryzen 7">AMD Ryzen 7</option><option value="AMD Ryzen 9">AMD Ryzen 9</option>
                    <option value="AMD Ryzen AI 5">AMD Ryzen AI 5</option><option value="AMD Ryzen AI 7">AMD Ryzen AI 7</option>
                    <option value="AMD Ryzen AI 9">AMD Ryzen AI 9</option>
                </select>
                <select id="p-gen"><option value="U">U</option><option value="H">H</option><option value="HS">HS</option><option value="HX">HX</option></select>
                <input type="number" id="p-ram" placeholder="RAM GB">
                <input type="text" id="p-ssd" placeholder="SSD Storage">
                <select id="p-gpu"><option value="NVIDIA RTX">NVIDIA RTX</option><option value="AMD RADEON">AMD RADEON</option><option value="Intel Iris">Intel Iris</option></select>
                <select id="p-vram">
                    <option value="None">None</option><option value="2GB">2GB</option><option value="4GB">4GB</option><option value="6GB">6GB</option>
                    <option value="8GB">8GB</option><option value="10GB">10GB</option><option value="12GB">12GB</option><option value="16GB">16GB</option>
                    <option value="24GB">24GB</option><option value="32GB">32GB</option>
                </select>
                <input type="text" id="p-screen" placeholder="Screen Size">
                <select id="p-condition"><option value="New">New</option><option value="Used">Used</option></select>
            </div>

            <div id="other-fields" style="display:none;">
                <textarea id="o-info" placeholder="Item Details (زانیاریێن ئامێری)" rows="2"></textarea>
            </div>

            <input type="number" id="add-q" placeholder="${l.inv_qty}">
            <button class="main-btn" onclick="addInv()"><i class="fa-solid fa-plus"></i> ${l.inv_add}</button>
        </div>
        <div class="table-wrap"><table><thead><tr><th>${l.inv_name}</th><th>Type</th><th>Qty</th><th>X</th></tr></thead>
        <tbody>${inv.map((x,idx)=>`<tr><td><b>${x.name}</b></td><td>${x.type}</td><td>${x.qty}</td><td><button onclick="delInv(${idx})" style="color:var(--danger); background:none; border:none;"><i class="fa-solid fa-trash"></i></button></td></tr>`).join('')}</tbody></table></div>`;
        document.getElementById('modal-universal').style.display = 'flex';
    }

    function toggleInvFields() {
        const type = document.getElementById('inv-type').value;
        document.getElementById('mobile-fields').style.display = type === 'Mobile' ? 'grid' : 'none';
        document.getElementById('pc-fields').style.display = type === 'Computer' ? 'grid' : 'none';
        document.getElementById('other-fields').style.display = type === 'Other' ? 'block' : 'none';
    }

    function addInv() { 
        let type = document.getElementById('inv-type').value, n = document.getElementById('add-n').value, q = parseInt(document.getElementById('add-q').value)||0; 
        if(!n || q <= 0) return;
        let deviceData = { name: n, qty: q, type: type };
        if(type === 'Mobile') {
            deviceData.model = document.getElementById('m-model').value;
            deviceData.color = document.getElementById('m-color').value;
            deviceData.storage = document.getElementById('m-storage').value;
            deviceData.ram = document.getElementById('m-ram').value;
            deviceData.condition = document.getElementById('m-condition').value;
        } else if(type === 'Computer') {
            deviceData.cpu = document.getElementById('p-cpu').value;
            deviceData.gen = document.getElementById('p-gen').value;
            deviceData.ram = document.getElementById('p-ram').value;
            deviceData.storage = document.getElementById('p-ssd').value;
            deviceData.gpu = document.getElementById('p-gpu').value;
            deviceData.vram = document.getElementById('p-vram').value;
            deviceData.screen = document.getElementById('p-screen').value;
            deviceData.condition = document.getElementById('p-condition').value;
        } else {
            deviceData.otherInfo = document.getElementById('o-info').value;
        }
        inv.push(deviceData); updateDB(); showInventory();
    }

    function scanForInv() {
        const modal = document.getElementById('modal-universal');
        const content = document.getElementById('modal-content');
        content.innerHTML = `<div id="qr-reader-inv"></div>`;
        let scanner = new Html5QrcodeScanner("qr-reader-inv", { fps: 10, qrbox: 250 });
        scanner.render((text) => {
            document.getElementById('add-n').value = text;
            scanner.clear();
            showInventory();
        });
    }

    function scanForSale() {
        const modal = document.getElementById('modal-universal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-title').innerText = "SCANNER / سکانەر";
        content.innerHTML = `<div id="qr-reader-sale"></div>`;
        modal.style.display = 'flex';
        let scanner = new Html5QrcodeScanner("qr-reader-sale", { fps: 10, qrbox: 250 });
        scanner.render((text) => {
            if(text.includes("POS-ELITE:")) {
                alert("Customer Receipt Found: " + text);
            } else {
                const itemFound = inv.find(x => x.name === text);
                if(itemFound) {
                    document.getElementById('i-item').value = text;
                    updateDetailsHint();
                } else {
                    alert("Item not found in Stock!");
                }
            }
            scanner.clear(); closeModal();
        });
    }

    function updateDetailsHint() {
        const iName = document.getElementById('i-item').value;
        const item = inv.find(x => x.name === iName);
        const hint = document.getElementById('item-details-hint');
        if(item) {
            if(item.type === 'Mobile') hint.innerText = `${item.model} | ${item.storage}GB`;
            else if(item.type === 'Computer') hint.innerText = `${item.cpu} | ${item.ram}GB RAM`;
            else hint.innerText = "Other Category Item";
        } else { hint.innerText = ""; }
    }

    function applyLang() {
        const l = translations[document.getElementById('lang-sel').value] || translations.bd; 
        const isLtr = ['en','tr'].includes(document.getElementById('lang-sel').value);
        document.body.dir = isLtr ? "ltr" : "rtl";
        document.getElementById('m-header').innerText = l.mhead; 
        document.getElementById('t-form').innerHTML = `<i class="fa-solid fa-cart-plus"></i> ${l.tform}`;
        document.getElementById('l-sale-type').innerText = l.lsaletype;
        document.getElementById('l-name').innerText = l.lname; 
        document.getElementById('l-phone').innerText = l.lphone;
        document.getElementById('l-witness').innerText = l.lwitness;
        document.getElementById('l-witness-phone').innerText = l.lwphone;
        document.getElementById('l-item').innerText = l.litem;
        document.getElementById('l-buy').innerText = l.lbuy; document.getElementById('l-down').innerText = l.ldown;
        document.getElementById('l-duration').innerText = l.lduration; document.getElementById('l-mon').innerText = l.lmon;
        document.getElementById('l-other-rate').innerText = l.custom_rate;
        document.getElementById('l-other-months').innerText = l.custom_months;
        document.getElementById('l-total-box').innerText = l.ltotal; document.getElementById('b-save').innerText = l.bsave; 
        document.getElementById('s1').innerText = l.s1; document.getElementById('s4').innerHTML = `${l.s4} <i class="fa-solid fa-eye privacy-toggle" onclick="togglePrivacy()"></i>`;
        document.getElementById('s-rem').innerText = l.srem; document.getElementById('s-annual').innerText = l.sannual;
        document.getElementById('l-note-title').innerText = l.lnote;
        document.getElementById('th1').innerText = l.th1; document.getElementById('th2').innerText = l.th2; 
        document.getElementById('th3').innerText = l.th3; document.getElementById('th_down').innerText = l.th_down; 
        document.getElementById('th4').innerText = l.th4; document.getElementById('th5').innerText = l.th5; 
        document.getElementById('m-archive').innerText = l.marchive; document.getElementById('m-trash').innerText = l.mtrash; 
        document.getElementById('m-backup').innerText = l.mbackup; document.getElementById('m-restore').innerText = l.mrestore; 
        document.getElementById('m-add').innerText = l.madd; document.getElementById('m-reports').innerText = l.mreports; 
        document.getElementById('m-about').innerText = l.mabout; document.getElementById('m-logout').innerText = l.mlogout; 
        document.getElementById('m-pc').innerText = l.mpc; 
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('m-dark').innerText = isDark ? l.mlight : l.mdark;
        document.getElementById('btn-close').innerText = l.bclose; document.getElementById('search-input').placeholder = l.search;
        render();
    }

    function render() {
        document.getElementById('v1').innerText = inv.reduce((a,b)=>a+parseInt(b.qty),0);
        let pro = 0, remTotal = 0, q = document.getElementById('search-input').value.toLowerCase();
        sales.forEach(s => { pro += (parseFloat(s.total) - parseFloat(s.buy)); remTotal += (parseFloat(s.mon) * (s.months - s.paid)); });
        document.getElementById('v4').innerText = privacyHidden ? "****" : "$" + pro.toFixed(0);
        document.getElementById('v-annual').innerText = privacyHidden ? "****" : "$" + (pro * 1.6).toFixed(0);
        document.getElementById('v-rem').innerText = "$" + remTotal.toFixed(0);
        let sel = document.getElementById('i-item'); let curr = sel.value;
        sel.innerHTML = '<option value="">--- ITEM ---</option>';
        inv.forEach(x => { if(x.qty>0) sel.innerHTML += `<option value="${x.name}">${x.name}</option>`; });
        sel.value = curr;
        let list = document.getElementById('sales-list'); list.innerHTML = '';
        sales.filter(s => s.name.toLowerCase().includes(q) || s.item.toLowerCase().includes(q)).forEach(s => {
            list.innerHTML += `<tr><td><b>${s.name}</b></td><td>${s.item}</td><td>$${s.total}</td><td>$${s.down}</td><td>${s.paid}/${s.months}</td><td><button onclick="pay(${s.id})" class="btn-sm" style="background:var(--success);"><i class="fa-solid fa-receipt"></i></button><button onclick="softDelete(${s.id})" class="btn-sm" style="background:var(--danger);"><i class="fa-solid fa-trash-can"></i></button></td></tr>`;
        });
    }

    function showReports(type = 'daily') {
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;
        document.getElementById('modal-title').innerText = l.mreports;
        if(document.getElementById('menu-overlay').classList.contains('show')) toggleMenu();

        let filtered = [];
        const today = new Date();
        
        if(type === 'daily') {
            const dateStr = today.toLocaleDateString();
            filtered = reports.filter(r => new Date(r.timestamp).toLocaleDateString() === dateStr);
        } else if(type === 'monthly') {
            const month = today.getMonth(), year = today.getFullYear();
            filtered = reports.filter(r => {
                const d = new Date(r.timestamp);
                return d.getMonth() === month && d.getFullYear() === year;
            });
        } else if(type === 'yearly') {
            const year = today.getFullYear();
            filtered = reports.filter(r => new Date(r.timestamp).getFullYear() === year);
        }

        const totalAmt = filtered.reduce((acc, curr) => acc + parseFloat(curr.mon), 0);

        document.getElementById('modal-content').innerHTML = `
        <div class="report-tabs">
            <button class="tab-btn ${type === 'daily' ? 'active' : ''}" onclick="showReports('daily')">${l.rep_d}</button>
            <button class="tab-btn ${type === 'monthly' ? 'active' : ''}" onclick="showReports('monthly')">${l.rep_m}</button>
            <button class="tab-btn ${type === 'yearly' ? 'active' : ''}" onclick="showReports('yearly')">${l.rep_y}</button>
        </div>
        <div class="rep-sum-box">
            <div class="rep-stat"><small>${l.rep_count}</small><h3>${filtered.length}</h3></div>
            <div class="rep-stat"><small>${l.rep_total}</small><h3 style="color:var(--success)">$${totalAmt.toFixed(2)}</h3></div>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>${l.th1}</th><th>Date</th><th>Amount</th></tr></thead>
                <tbody>${filtered.map(x=>`<tr><td>${x.name}</td><td>${x.payDate}</td><td>$${x.mon}</td></tr>`).join('')}</tbody>
            </table>
        </div>`;
        document.getElementById('modal-universal').style.display = 'flex';
    }

    function toggleLayout() { document.getElementById('app-container').classList.toggle('pc-mode-active'); toggleMenu(); }
    function toggleMenu() { document.getElementById('menu-overlay').classList.toggle('show'); }
    function delInv(idx) { if(confirm("DELETE?")){inv.splice(idx,1); updateDB(); showInventory();} }
    function softDelete(id) { if(confirm("MOVE TO TRASH?") && prompt("KEY:")===SECRET_KEY){ let idx=sales.findIndex(x=>x.id===id); trash.unshift(sales[idx]); sales.splice(idx,1); updateDB(); } }
    function showArchive() { document.getElementById('modal-title').innerText="COMPLETED"; document.getElementById('modal-content').innerHTML=`<div class="table-wrap"><table><thead><tr><th>Name</th><th>Total</th></tr></thead><tbody>${archive.map(x=>`<tr><td>${x.name}</td><td>$${x.total}</td></tr>`).join('')}</tbody></table></div>`; document.getElementById('modal-universal').style.display='flex'; toggleMenu(); }
    function showRecycleBin() { document.getElementById('modal-title').innerText="TRASH"; document.getElementById('modal-content').innerHTML=`<div class="table-wrap"><table><tbody>${trash.map((x,idx)=>`<tr><td>${x.name}</td><td><button onclick="restore(${idx})" class="main-btn">RESTORE</button></td></tr>`).join('')}</tbody></table></div>`; document.getElementById('modal-universal').style.display='flex'; toggleMenu(); }
    function restore(idx) { sales.unshift(trash[idx]); trash.splice(idx,1); updateDB(); closeModal(); }
    function closeModal() { document.getElementById('modal-universal').style.display='none'; }
    function exportToExcel() { const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sales), "Sales"); XLSX.writeFile(wb, "Backup.xlsx"); }
    function triggerRestore() { document.getElementById('restore-input').click(); }
    function restoreData(e) { const reader = new FileReader(); reader.onload = (ev) => { const d = JSON.parse(ev.target.result); inv=d.i||[]; sales=d.s||[]; updateDB(); location.reload(); }; reader.readAsText(e.target.files[0]); }
    function showAbout() {
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;
        document.getElementById('modal-title').innerText = l.mabout;
        document.getElementById('modal-content').innerHTML = `
        <div style="text-align:center; padding:20px;">
            <img src="https://i.postimg.cc/nV1HLXWy/EFAC45A5-C196-48E5-913E-A27706778B90.jpg" style="width:120px; border-radius:50%; border:3px solid var(--neon-blue); margin-bottom:15px;">
            <h2 style="color:var(--neon-blue)">Bizhar Rasheed</h2>
            <p style="font-weight:700; margin-bottom:5px;">${l.dev_role}</p>
            <p>${l.dev_msg}</p>
            <a href="https://bizhar-cloud.github.io/BizharRasheed/" target="_blank" class="dev-link">
                <i class="fa-solid fa-globe"></i> ${l.click_visit}
            </a>
        </div>`;
        document.getElementById('modal-universal').style.display = 'flex'; toggleMenu();
    }
</script>
</body>
</html>
