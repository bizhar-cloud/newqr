<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Installments POS - ELITE V8.7</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/3WMQdH2P/17ABF58A-85E9-4C1A-B6DD-97977E81AA3C.jpg">
    <link rel="icon" href="https://i.postimg.cc/3WMQdH2P/17ABF58A-85E9-4C1A-B6DD-97977E81AA3C.jpg">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Roboto:wght@400;700&display=swap');

        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --primary: #2563eb; 
            --neon-blue: #00d2ff; --neon-purple: #bd00ff; --border: #cbd5e1; --success: #10b981; --danger: #ef4444;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body.dark-mode {
            --bg: #020617; --card: #0f172a; --text: #f1f5f9; --primary: #3b82f6; 
            --neon-blue: #00f2ff; --neon-purple: #df00ff; --border: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans Arabic', 'Roboto', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }

        /* Toast Styling */
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: var(--card);
            color: var(--text);
            padding: 12px 25px;
            border-radius: 15px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toast-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), toast-out 0.4s 2.5s forwards;
            min-width: 250px;
            justify-content: center;
        }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.danger { border-color: var(--danger); color: var(--danger); }
        @keyframes toast-in { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toast-out { from { transform: translateY(0); opacity: 1; } to { transform: translateY(100px); opacity: 0; } }

        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 999999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .login-box { background: var(--card); padding: 40px; border-radius: 30px; border: 2px solid var(--neon-blue); width: 350px; text-align: center; box-shadow: 0 0 50px rgba(0,210,255,0.2); }

        header { 
            background: var(--card); height: 80px; padding: 0 20px; 
            border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .brand h2 { font-weight: 900; background: linear-gradient(135deg, #00d2ff, #bd00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .settings-btn, .notif-btn { width: 45px; height: 45px; border-radius: 12px; background: var(--bg); color: var(--neon-blue); display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--neon-blue); cursor: pointer; position: relative; }
        
        .notif-btn.active { color: var(--danger); border-color: var(--danger); animation: bell-ring 0.5s infinite; }
        @keyframes bell-ring {
            0%, 100% { transform: rotate(0); }
            20% { transform: rotate(15deg); }
            40% { transform: rotate(-15deg); }
            60% { transform: rotate(10deg); }
            80% { transform: rotate(-10deg); }
        }
        .notif-count { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid var(--card); }

        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .menu-overlay.show { display: flex; }
        .dropdown-menu { background: var(--card); border-radius: 30px; width: 340px; padding: 25px; border: 2px solid var(--neon-blue); max-height: 90vh; overflow-y: auto; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 16px; border-radius: 18px; cursor: pointer; color: var(--text); border: none; background: none; width: 100%; font-weight: 700; transition: 0.2s; margin-bottom: 8px; }
        .menu-item i { width: 25px; color: var(--neon-blue); text-align: center; }
        .menu-item:hover { background: var(--bg); border-right: 5px solid var(--neon-blue); }

        #lang-sel { 
            width: 100%; height: 55px; border: 2px solid var(--neon-blue); border-radius: 18px; margin-top: 15px; 
            font-weight: bold; background: var(--card); color: var(--text); padding: 0 15px; text-align: right; appearance: none;
            background-repeat: no-repeat; background-position: left 15px center;
        }
        body[dir="ltr"] #lang-sel { text-align: left; background-position: right 15px center; }

        .container { width: 100%; max-width: 1400px; margin: 25px auto; padding: 0 15px; }
        .pc-mode-active { display: grid !important; grid-template-columns: 420px 1fr !important; gap: 30px; }
        
        .card { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: var(--shadow); }
        input, select, textarea { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 15px; background: var(--bg); color: var(--text); margin-top: 8px; outline: none; font-size: 16px; font-family: inherit; }

        .main-btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 900; background: linear-gradient(45deg, var(--primary), var(--neon-blue)); color: white; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.2s, opacity 0.2s; }
        .main-btn:hover:not(:disabled) { transform: translateY(-2px); opacity: 0.9; }
        .main-btn:disabled { background: #94a3b8; cursor: not-allowed; opacity: 0.6; }
        
        .table-wrap { background: var(--card); border-radius: 25px; overflow-x: auto; border: 1.5px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th { background: var(--bg); padding: 18px; color: var(--primary); font-weight: 900; font-size: 13px; text-align: center; }
        td { padding: 18px; border-bottom: 1px solid var(--border); text-align: center; font-weight: 600; }

        .btn-sm { width: 40px; height: 40px; border-radius: 12px; border: none; color: white; cursor: pointer; margin: 3px; transition: transform 0.2s; }
        .btn-sm:hover { transform: scale(1.1); }
        .privacy-toggle { cursor: pointer; font-size: 18px; margin-left: 8px; color: var(--primary); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1.5px solid var(--border); text-align: center; position: relative; }
        .stat-card h3 { font-size: 24px; font-weight: 900; margin-top: 5px; }
        .stat-card small { color: #64748b; font-weight: 700; font-size: 11px; display: block; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 99999; backdrop-filter: blur(12px); }
        .modal-card { background: var(--card); border-radius: 35px; padding: 30px; border: 2px solid var(--neon-blue); width: 95%; max-width: 850px; max-height: 90vh; overflow-y: auto; }

        #reader-box { width: 100% !important; border-radius: 15px; overflow: hidden; background: #000; position: relative; border: 2px solid var(--neon-blue); min-height: 300px; }
        #reader-box video { width: 100% !important; height: auto !important; object-fit: cover !important; border-radius: 15px; }

        .scan-action-btn { background: #6366f1; color: white; padding: 12px; border-radius: 12px; border: none; cursor: pointer; transition: 0.3s; }
        .scan-action-btn:hover { background: #4f46e5; transform: scale(1.05); }
        
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

        .report-tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 80px; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-weight: bold; font-size: 12px; transition: all 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .tab-btn:hover:not(.active) { background: var(--border); }
        .rep-sum-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .rep-stat { background: var(--bg); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }

        #print-area { display: none; }
        @media print {
            @page { margin: 0; size: auto; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                display: block !important; 
                position: absolute; left: 0; top: 0; 
                width: 100%; padding: 4mm; 
                background: white; color: black; 
                font-family: 'Noto Sans Arabic', sans-serif;
                font-size: 10pt; line-height: 1.4;
            }
            .print-80mm { width: 76mm !important; margin: 0 auto; }
            .print-58mm { width: 54mm !important; margin: 0 auto; }
            .label-print { width: 40mm; height: 20mm; text-align: center; border: 0.2mm solid #000; padding: 2mm; margin: 0 auto; }
            
            .thermal-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 3mm; margin-bottom: 3mm; }
            .thermal-logo { width: 45mm; height: auto; margin-bottom: 2mm; filter: grayscale(1); }
            .thermal-row { display: flex; justify-content: space-between; margin-bottom: 2mm; border-bottom: 0.1mm solid #eee; }
            .thermal-row b { font-weight: 900; }
            .thermal-footer { text-align: center; border-top: 1px dashed #000; padding-top: 3mm; margin-top: 4mm; font-size: 9pt; }
            .receipt-title { font-weight: 900; border: 1px solid #000; padding: 1.5mm 3mm; display: inline-block; margin-bottom: 3mm; font-size: 11pt; border-radius: 2mm; }
            #qr-code-final { margin: 4mm auto; display: block; }
            #qr-code-final img { margin: 0 auto; }
            .thermal-item-box { background: #f9f9f9; padding: 2mm; border-radius: 1mm; margin: 2mm 0; }
        }

        .dev-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white !important;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            transition: 0.3s;
        }
        .dev-link:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }

        .notif-item { background: var(--bg); padding: 15px; border-radius: 15px; border: 1.5px solid var(--border); margin-bottom: 10px; position: relative; }
        .notif-item b { color: var(--danger); display: block; }
        .notif-item span { font-size: 13px; font-weight: 600; }

        .receipt-preview {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .print-settings {
            background: var(--bg);
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .history-list { list-style: none; padding: 0; }
        .history-item { 
            background: var(--bg); 
            margin-bottom: 10px; 
            padding: 15px; 
            border-radius: 15px; 
            border-right: 4px solid var(--success);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upload-area { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .upload-btn { background: #475569; color: white; border: none; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; }
        .upload-btn:hover { background: #334155; }
        #doc-preview { width: 100%; max-height: 200px; object-fit: contain; border-radius: 15px; margin-top: 10px; display: none; border: 2px solid var(--border); }
        
        /* Cyber-Glass Delete Confirmation Styles */
        .confirm-box { text-align: center; padding: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; backdrop-filter: blur(5px); }
        .confirm-box i { font-size: 3rem; color: var(--danger); margin-bottom: 15px; }
        .confirm-actions { display: flex; gap: 10px; margin-top: 25px; }
        .confirm-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; transition: transform 0.2s; }
        .confirm-btn:hover { transform: translateY(-2px); }
        .btn-yes { background: var(--danger); color: white; }
        .btn-no { background: #475569; color: white; }

        /* Responsive fixes */
        @media (max-width: 768px) {
            .pc-mode-active { grid-template-columns: 1fr !important; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .login-box { width: 90%; max-width: 350px; padding: 30px 20px; }
            .modal-card { width: 95%; padding: 20px; border-radius: 20px; }
            th, td { padding: 12px 8px; font-size: 12px; }
            .btn-sm { width: 35px; height: 35px; }
        }

        /* Loading spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Scanner container fixes */
        #reader-box:empty::before {
            content: "Camera loading...";
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="login-overlay">
    <div class="login-box">
        <img src="https://i.postimg.cc/nV1HLXWy/EFAC45A5-C196-48E5-913E-A27706778B90.jpg" style="width: 100%; border-radius: 20px; margin-bottom: 20px;" alt="Logo">
        <h2 id="login-title" style="color:var(--neon-blue); margin-bottom:20px; font-weight: 900;">Installments POS</h2>
        <input type="text" id="login-user" placeholder="USERNAME" autocomplete="username">
        <input type="password" id="login-pass" placeholder="PASSWORD" autocomplete="current-password">
        <button class="main-btn" id="login-btn" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<header>
    <div class="header-actions">
        <button class="notif-btn" id="notif-bell" onclick="showNotifs()">
            <i class="fa-solid fa-bell"></i>
            <div id="notif-badge" class="notif-count" style="display:none">0</div>
        </button>
    </div>
    <div class="brand"><h2>Installments POS</h2></div>
    <div class="header-actions">
        <button class="settings-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></button>
    </div>
</header>

<div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()">
    <div class="dropdown-menu" onclick="event.stopPropagation()">
        <h4 id="m-header" style="text-align:center; color:var(--neon-blue); margin-bottom:20px; font-weight: 900;">MENU</h4>
        <button class="menu-item" onclick="toggleLayout()"><i class="fa-solid fa-display"></i> <span id="m-pc">PC Mode</span></button>
        <button class="menu-item" onclick="toggleDark()"><i id="mode-icon" class="fa-solid fa-moon"></i> <span id="m-dark">Dark Mode</span></button>
        
        <div id="admin-only-menu">
            <button class="menu-item" onclick="showReports('daily')"><i class="fa-solid fa-chart-line"></i> <span id="m-reports">Reports</span></button>
            <button class="menu-item" onclick="showDailyClosing()"><i class="fa-solid fa-cash-register"></i> <span id="m-closing">Daily Closing</span></button>
            <button class="menu-item" onclick="showCashDrawer()"><i class="fa-solid fa-vault"></i> <span id="m-vault">Cash Drawer</span></button>
            <button class="menu-item" onclick="showArchive()"><i class="fa-solid fa-folder-open"></i> <span id="m-archive">Archive</span></button>
            <button class="menu-item" onclick="showRecycleBin()"><i class="fa-solid fa-trash-can"></i> <span id="m-trash">Recycle Bin</span></button>
            <button class="menu-item" onclick="checkInvPass()"><i class="fa-solid fa-boxes-stacked"></i> <span id="m-add">Inventory</span></button>
            <button class="menu-item" onclick="showLabelMaker()"><i class="fa-solid fa-tags"></i> <span id="m-label">Label Maker</span></button>
            <hr style="border: 0.5px solid var(--border); margin: 15px 0;">
            <button class="menu-item" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> <span id="m-backup">Export Excel</span></button>
            <button class="menu-item" onclick="exportJSON()"><i class="fa-solid fa-file-code"></i> <span id="m-backup-json">Backup (JSON)</span></button>
            <button class="menu-item" onclick="exportPDF()"><i class="fa-solid fa-file-pdf"></i> <span id="m-pdf">Export PDF</span></button>
            <button class="menu-item" onclick="triggerRestore()"><i class="fa-solid fa-cloud-arrow-up"></i> <span id="m-restore">Restore Data</span></button>
            <input type="file" id="restore-input" style="display:none" accept=".json" onchange="restoreData(event)">
        </div>

        <button class="menu-item" onclick="showAbout()"><i class="fa-solid fa-user-gear"></i> <span id="m-about">Developer</span></button>
        
        <select id="lang-sel" onchange="applyLang()">
            <option value="bd">کوردی (بادینی)</option>
            <option value="sr">کوردی (سۆرانی)</option>
            <option value="ar">العربية (Arabic)</option>
            <option value="en">English (US)</option>
            <option value="tr">Türkçe (Turkish)</option>
            <option value="fa">فارسی (Persian)</option>
        </select>
        
        <button class="menu-item" onclick="logout()" style="color:var(--danger); margin-top: 15px;"><i class="fa-solid fa-power-off"></i> <span id="m-logout">Logout</span></button>
        <button class="main-btn" onclick="toggleMenu()" id="btn-close" style="background:#475569; margin-top: 20px;">CLOSE</button>
    </div>
</div>

<div class="container" id="app-container">
    <div id="side-p">
        <div class="card" style="border-top: 6px solid var(--primary);">
            <h3 id="t-form" style="font-weight: 900; color: var(--primary);"><i class="fa-solid fa-cart-plus"></i> NEW SALE</h3>
            
            <label id="l-sale-type" style="font-weight: 700; margin-top: 15px; display: block;">SALE TYPE</label>
            <select id="i-sale-type" onchange="toggleSaleMode()">
                <option value="Installments" id="opt-inst">Installments (بقیست)</option>
                <option value="Cash" id="opt-cash">Cash (کاش)</option>
                <option value="Debt" id="opt-debt">Debt (قەرز/دەین)</option>
            </select>

            <label id="l-name" style="font-weight: 700; margin-top: 15px; display: block;">CUSTOMER NAME</label>
            <input type="text" id="i-name" placeholder="..." autocomplete="name">

            <label id="l-phone" style="font-weight: 700; margin-top: 15px; display: block;">CUSTOMER PHONE</label>
            <input type="tel" id="i-phone" placeholder="0750 xxx xxxx" pattern="[0-9]*" autocomplete="tel">

            <div class="upload-area">
                <label style="font-weight: 700; display: block;" id="l-upload-label">CUSTOMER DOCUMENT (ناسنامە)</label>
                <button class="upload-btn" onclick="document.getElementById('doc-file').click()">
                    <i class="fa-solid fa-camera"></i> <span id="l-upload-text">TAKE PHOTO / UPLOAD</span>
                </button>
                <input type="file" id="doc-file" accept="image/*" capture="environment" style="display:none" onchange="previewDoc(this)">
                <img id="doc-preview" src="" alt="Document Preview">
            </div>

            <div id="witness-section">
                <label id="l-witness" style="font-weight: 700; margin-top: 15px; display: block;">WITNESS NAME</label>
                <input type="text" id="i-witness" placeholder="..." autocomplete="off">

                <label id="l-witness-phone" style="font-weight: 700; margin-top: 15px; display: block;">WITNESS PHONE</label>
                <input type="tel" id="i-witness-phone" placeholder="0750 xxx xxxx" pattern="[0-9]*" autocomplete="off">
            </div>

            <label id="l-item" style="margin-top:20px; display:block; font-weight: 700;">ITEM</label>
            <div style="display: flex; gap: 8px;">
                <select id="i-item" style="flex: 1;" onchange="updateDetailsHint()"></select>
                <button onclick="scanForSale()" class="scan-action-btn" style="margin-top: 8px;"><i class="fa-solid fa-barcode"></i><i class="fa-solid fa-qrcode"></i></button>
            </div>
            <div id="item-details-hint" style="font-size: 11px; color: var(--primary); margin-top: 5px; font-weight: bold;"></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px;">

            reader.onload = function(e) {

    function calc() {
        const type = document.getElementById('i-sale-type').value;
        let b = parseFloat(document.getElementById('i-buy').value)||0; 
        let d = parseFloat(document.getElementById('i-down').value)||0; 
        let total = b;
        let mon = 0;
        let m = 1;

        if (type === 'Installments') {
            let selectedPlan = document.getElementById('i-months').value;
            let rate = 0;
            
            if (selectedPlan === 'Other') {
                rate = (parseFloat(document.getElementById('i-other-rate').value)||0) / 100;
                m = parseInt(document.getElementById('i-other-months').value)||1;
                if(m <= 0 || isNaN(m)) m = 1;
            } else {
                let rates = {2:0.15, 3:0.25, 4:0.35, 6:0.40, 8:0.50, 10:0.60, 12:0.70, 16:0.85};
                m = parseInt(selectedPlan);
                rate = rates[m] || 0;
            }
            
            let remainingBase = Math.max(0, b - d);
            let profitAmount = remainingBase * rate;
            
            total = Math.round((b + profitAmount) * 100) / 100;
            mon = Math.round(((total - d) / m) * 100) / 100;

        } else if (type === 'Debt') {
            total = b;
            mon = Math.max(0, b - d);
            m = 1;
        } else {
            total = b;
            mon = 0;
            m = 1; 
        }

        document.getElementById('o-mon').innerText = "$" + (mon > 0 ? mon.toFixed(2) : 0);
        document.getElementById('o-total').innerText = "$" + total.toFixed(2);
        return { 
            total: Number(total.toFixed(2)), 
            mon: Number(mon.toFixed(2)), 
            b: Number(b.toFixed(2)), 
            d: Number(d.toFixed(2)), 
            m: m 
        };
    }

    async function saveSale() {
        let n = document.getElementById('i-name').value.trim();
        let phone = document.getElementById('i-phone').value.trim();
        let wit = document.getElementById('i-witness').value.trim();
        let witPhone = document.getElementById('i-witness-phone').value.trim();
        let iId = document.getElementById('i-item').value;
        let nt = document.getElementById('i-note').value;
        let saleType = document.getElementById('i-sale-type').value;
        
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;

        if(!n || !iId) {
            showToast("Please fill required fields!", "danger");
            return;
        }

        const phoneRegex = /^[0-9]{10,15}$/;
        if(!phoneRegex.test(phone)) { 
            showToast(l.invalid_phone || "Invalid Phone!", "danger"); 
            return; 
        }
        if(saleType === 'Installments' && !phoneRegex.test(witPhone)) { 
            showToast(l.invalid_phone || "Invalid Witness Phone!", "danger"); 
            return; 
        }

        let idx = inv.findIndex(x => x.id == iId || x.name == iId);
        if(idx === -1 || inv[idx].qty <= 0) { 
            showToast(l.out_of_stock || "Out of Stock!", "danger"); 
            return; 
        }

        const saveBtn = document.getElementById('save-sale-btn');
        const originalBtnContent = saveBtn.innerHTML;
        saveBtn.disabled = true;
        saveBtn.innerHTML = `<div class="spinner"></div> UPLOADING...`;

        let docUrl = "";
        if (currentDocFile) {
            try {
                const storageRef = storage.ref(`documents/${Date.now()}_${currentDocFile.name}`);
                const snapshot = await storageRef.put(currentDocFile);
                docUrl = await snapshot.ref.getDownloadURL();
            } catch (e) {
                console.error("Upload Error", e);
                showToast("Image Upload Failed!", "danger");
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalBtnContent;
                return;
            }
        }

        let p = calc();
        let itemFullData = JSON.parse(JSON.stringify(inv[idx])); 
        
        let oldQty = inv[idx].qty;
        inv[idx].qty--;
        
        const now = new Date();
        const saleData = { 
            id: Date.now(), 
            name: n, 
            phone: phone,
            customerDoc: docUrl, 
            witness: (saleType === 'Cash' || saleType === 'Debt' ? 'N/A' : wit),
            witnessPhone: (saleType === 'Cash' || saleType === 'Debt' ? 'N/A' : witPhone),
            item: itemFullData.name, 
            itemId: itemFullData.id, 
            itemDetails: itemFullData, 
            total: p.total, 
            buy: p.b, 
            cost: Number(parseFloat(itemFullData.cost || 0).toFixed(2)), 
            down: p.d, 
            mon: p.mon, 
            months: p.m, 
            paid: 0, 
            date: now.toLocaleString(),
            lastPaymentDate: now.getTime(),
            timestamp: now.getTime(),
            note: nt, 
            type: saleType,
            paymentsHistory: []
        };
        
        if(saleType === 'Cash') archive.unshift(saleData);
        else sales.unshift(saleData);

        updateDB((success) => {
            saveBtn.disabled = false;
            saveBtn.innerHTML = originalBtnContent;
            if(success) {
                showToast(l.success_save, "success");
                ["i-name", "i-phone", "i-witness", "i-witness-phone", "i-note", "i-buy", "i-down"].forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.value = "";
                });
                const docPreview = document.getElementById('doc-preview');
                if(docPreview) {
                    docPreview.style.display = 'none';
                    docPreview.src = "";
                }
                currentDocFile = null;
                calc();
                applyLang();
            } else {
                inv[idx].qty = oldQty;
                if(saleType === 'Cash') archive.shift();
                else sales.shift();
            }
        }); 
    }

    function updateSale(id) {

    function pay(id) {
        if(prompt("KEY:") !== SECRET_KEY && currentUserRole !== "Cashier") return;
        let idx = sales.findIndex(x => x.id === id);
        if(idx !== -1) {
            let count = 1;
            let amountToPay = 0;
            
            if(sales[idx].type === 'Debt') {
                amountToPay = parseFloat(prompt("چەند پارەی ددەت؟ (Amount to pay?)", sales[idx].mon)) || 0;
                if(amountToPay <= 0) return;
                count = 1;
            } else {
                count = parseInt(prompt("چەند قیستان ددەت؟ (How many months?)", "1")) || 1;
                let available = sales[idx].months - sales[idx].paid;
                if(count > available) count = available;
                if(count <= 0) return;
                amountToPay = parseFloat(sales[idx].mon);
            }

            let oldSales = JSON.parse(JSON.stringify(sales));
            let oldArchive = JSON.parse(JSON.stringify(archive));
            let oldReports = JSON.parse(JSON.stringify(reports));

            const now = new Date();
            const payTime = now.toLocaleString();
            
            if(!sales[idx].paymentsHistory) sales[idx].paymentsHistory = [];

            let tempReports = [];
            if(sales[idx].type === 'Debt') {
                let currentDebt = parseFloat(sales[idx].mon);
                let newDebt = Math.max(0, currentDebt - amountToPay);
                sales[idx].mon = Number(newDebt.toFixed(2));
                sales[idx].paymentsHistory.push({ installmentNo: 'Debt Payment', amount: amountToPay.toFixed(2), date: payTime, collector: currentUserRole });
                const rep = { ...sales[idx], payDate: payTime, mon: Number(amountToPay.toFixed(2)), currentPayment: 'Debt', remAmt: sales[idx].mon, remCount: 0, timestamp: Date.now() };
                reports.unshift(rep);
                tempReports.push(rep);
                if(sales[idx].mon <= 0) { archive.unshift(sales[idx]); sales.splice(idx, 1); }
            } else {
                for(let i=0; i<count; i++) {
                    sales[idx].paid++;
                    sales[idx].paymentsHistory.push({ installmentNo: sales[idx].paid, amount: amountToPay.toFixed(2), date: payTime, collector: currentUserRole });
                    
                    const paidAmountTotal = (parseFloat(sales[idx].mon) * sales[idx].paid);
                    const calculatedRemain = Math.max(0, (parseFloat(sales[idx].total) - parseFloat(sales[idx].down) - paidAmountTotal));
                    
                    const rep = { 
                        ...sales[idx], 
                        payDate: payTime, 
                        mon: Number(amountToPay.toFixed(2)),
                        currentPayment: sales[idx].paid, 
                        remAmt: Number(calculatedRemain.toFixed(2)), 
                        remCount: (sales[idx].months - sales[idx].paid), 
                        timestamp: Date.now() 
                    };
                    reports.unshift(rep);
                    tempReports.push(rep);
                }
                if(sales[idx].paid >= sales[idx].months) { archive.unshift(sales[idx]); sales.splice(idx, 1); }
            }
            
            if(idx !== -1 && sales[idx]) sales[idx].lastPaymentDate = now.getTime();

            updateDB((success) => {
                const l = translations[document.getElementById('lang-sel').value] || translations.bd;
                if(success) {
                    showToast(l.success_pay, "success");
                    if(tempReports.length > 0) {
                        showReceiptPreview(tempReports[tempReports.length - 1]);
                    }
                } else { 
                    sales = oldSales; 
                    archive = oldArchive; 
                    reports = oldReports; 
                    render(); 
                }
            });
        }
    }

    // FIXED: Proper scanner implementation using Html5Qrcode (not Html5QrcodeScanner)
    function startGenericScanner(targetInputId) {
        if (isScanning) return;
        
        // Clean up any existing scanner
        if (activeScanner) {
            activeScanner.stop().then(() => {
                activeScanner = null;
                initScanner(targetInputId);
            }).catch(() => {
                activeScanner = null;
                initScanner(targetInputId);
            });
        } else {
            initScanner(targetInputId);
        }
    }

    function initScanner(targetInputId) {
        isScanning = true;
        const content = document.getElementById('modal-content');
        const oldHtml = content.innerHTML;
        
        content.innerHTML = `
            <div id="reader-box"></div>
            <button class="main-btn" id="close-scanner-btn" style="background:#475569; margin-top:15px;">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
        `;
        
        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        };
        
        activeScanner = new Html5Qrcode("reader-box");
        
        activeScanner.start(
            { facingMode: "environment" }, 
            config, 
            (decodedText) => {
                // Success callback
                document.getElementById(targetInputId).value = decodedText;
                if(targetInputId === 'i-item') updateDetailsHint();
                stopAndResetScanner(targetInputId, oldHtml);
            },
            (errorMessage) => {
                // Error callback - silently ignore scan errors
            }
        ).catch((err) => {
            console.error("Scanner start failed:", err);
            showToast("Camera access denied or not available", "danger");
            stopAndResetScanner(targetInputId, oldHtml);
        });
        
        document.getElementById('close-scanner-btn').onclick = () => {
            stopAndResetScanner(targetInputId, oldHtml);
        };
    }

    function stopAndResetScanner(targetInputId, oldHtml) {
        isScanning = false;
        if(activeScanner) {
            activeScanner.stop().then(() => {
                activeScanner = null;
                if(targetInputId === 'add-n') showInventory();
                else closeModal();
            }).catch((err) => {
                console.error("Stop error:", err);
                activeScanner = null;
                if(targetInputId === 'add-n') showInventory();
                else closeModal();
            });
        } else {
            if(targetInputId === 'add-n') showInventory();
            else closeModal();
        }
    }

    function render() {
        const v1 = document.getElementById('v1');
        const v4 = document.getElementById('v4');
        const vAnnual = document.getElementById('v-annual');
        const vRem = document.getElementById('v-rem');
        
        if(v1) v1.innerText = inv.reduce((a,b)=>a+parseInt(b.qty),0);
        
        let pro = 0, remTotal = 0;
        const q = document.getElementById('search-input').value.toLowerCase();
        
        const processSaleProfit = (s) => {
            let totalVal = parseFloat(s.total) || 0;
            let costVal = parseFloat(s.cost) || 0;
            let downVal = parseFloat(s.down) || 0;
            let monVal = parseFloat(s.mon) || 0;
            let paidCount = parseInt(s.paid) || 0;
            let monthsVal = parseInt(s.months) || 1;
            
            if (s.type === 'Debt') {
                let saleProfit = totalVal - costVal;
                let currentCashIn = downVal;
                let currentProfitShare = totalVal > 0 ? (currentCashIn / totalVal) * saleProfit : 0;
                pro += currentProfitShare;
                remTotal += parseFloat(s.mon);
            } else if (totalVal > 0) {
                let saleProfit = totalVal - costVal;
                let currentCashIn = downVal + (monVal * paidCount);
                let currentProfitShare = (currentCashIn / totalVal) * saleProfit;
                pro += currentProfitShare;
                remTotal += (monVal * (monthsVal - paidCount));
            }
        };
        
        sales.forEach(processSaleProfit);
        archive.forEach(s => { 
            pro += (parseFloat(s.total) - parseFloat(s.cost || 0)); 
        });

        if(v4) v4.innerText = privacyHidden ? "****" : "$" + Number(pro.toFixed(0));
        if(vAnnual) vAnnual.innerText = privacyHidden ? "****" : "$" + Number((pro * 1.6).toFixed(0));
        if(vRem) vRem.innerText = "$" + Number(remTotal.toFixed(0));
        
        let sel = document.getElementById('i-item');
        if(sel) {
            let curr = sel.value;
            sel.innerHTML = '<option value="">--- ITEM ---</option>';
            inv.forEach(x => { 
                if(x.qty > 0) sel.innerHTML += `<option value="${x.id}">${x.name}</option>`; 
            });
            sel.value = curr;
        }
        
        let list = document.getElementById('sales-list');
        if(list) {
            list.innerHTML = '';
            sales.filter(s => {
                return s.name.toLowerCase().includes(q) || 
                       s.item.toLowerCase().includes(q) || 
                       s.id.toString().includes(q);
            }).forEach(s => {
                list.innerHTML += `<tr>
                    <td><b>${s.name}</b><br><small style="color:${s.type==='Debt'?'var(--danger)':'var(--primary)'}">${s.type}</small></td>
                    <td>${s.item}</td>
                    <td>$${s.total}</td>
                    <td>$${s.down}</td>
                    <td>${s.type==='Debt'?'$'+s.mon:s.paid+'/'+s.months}</td>
                    <td>
                        <button onclick="pay(${s.id})" class="btn-sm" style="background:var(--success);"><i class="fa-solid fa-receipt"></i></button>
                        <button onclick="showLedger(${s.id})" class="btn-sm" style="background:var(--primary);"><i class="fa-solid fa-clock-rotate-left"></i></button>
                        ${currentUserRole === "Admin" ? `
                            <button onclick="editSale(${s.id})" class="btn-sm" style="background:#f59e0b;"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="softDelete(${s.id})" class="btn-sm" style="background:var(--danger);"><i class="fa-solid fa-trash-can"></i></button>
                        ` : ''}
                    </td>
                </tr>`;
            });
        }
    }

        document.getElementById('modal-title').innerText = l.mreports;
        
        const menuOverlay = document.getElementById('menu-overlay');
        if(menuOverlay && menuOverlay.classList.contains('show')) toggleMenu();
        
        const now = new Date();
        let filtered = [];
        
        if(type === 'daily') {
            filtered = reports.filter(r => new Date(r.timestamp).toDateString() === now.toDateString());
        } else if(type === 'weekly') {
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            filtered = reports.filter(r => new Date(r.timestamp) >= weekAgo);
        } else if(type === 'monthly') {
            filtered = reports.filter(r => {
                const d = new Date(r.timestamp);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
        } else if(type === 'yearly') {
            filtered = reports.filter(r => new Date(r.timestamp).getFullYear() === now.getFullYear());
        }
        
        const totalAmt = filtered.reduce((acc, curr) => acc + parseFloat(curr.mon), 0);
        
        document.getElementById('modal-content').innerHTML = `
        <div class="report-tabs">
            <button class="tab-btn ${type==='daily'?'active':''}" onclick="showReports('daily')">${l.rep_d}</button>
            <button class="tab-btn ${type==='weekly'?'active':''}" onclick="showReports('weekly')">${l.rep_w}</button>
            <button class="tab-btn ${type==='monthly'?'active':''}" onclick="showReports('monthly')">${l.rep_m}</button>
            <button class="tab-btn ${type==='yearly'?'active':''}" onclick="showReports('yearly')">${l.rep_y}</button>
        </div>
        <div class="rep-sum-box">
            <div class="rep-stat"><small>${l.rep_count}</small><h3>${filtered.length}</h3></div>
            <div class="rep-stat"><small>${l.rep_total}</small><h3>$${totalAmt.toFixed(2)}</h3></div>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Customer</th><th>Amount</th><th>Date</th></tr></thead>
                <tbody>${filtered.map(x=>`<tr><td>${x.name}</td><td>$${parseFloat(x.mon).toFixed(2)}</td><td style="font-size:10px;">${new Date(x.timestamp).toLocaleDateString()}</td></tr>`).join('')}</tbody>
            </table>
        </div>`;
        
        document.getElementById('modal-universal').style.display = 'flex';
    }

    function showDailyClosing() {
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;
        const nowStr = new Date().toDateString();
        const nowFormatted = new Date().toLocaleString();
        
        let dailyDownPayments = 0, downPayCount = 0;
        [...sales, ...archive].forEach(s => { 
            if (new Date(s.timestamp).toDateString() === nowStr) { 
                dailyDownPayments += parseFloat(s.down); 
                downPayCount++; 
            } 
        });
        
        const dailyInstallments = reports.filter(r => new Date(r.timestamp).toDateString() === nowStr);
        const installmentTotal = dailyInstallments.reduce((acc, curr) => acc + parseFloat(curr.mon), 0);
        const closingTotal = dailyDownPayments + installmentTotal;
        
        document.getElementById('modal-title').innerText = l.mclosing;
        document.getElementById('modal-content').innerHTML = `
            <div class="card receipt-preview" id="closing-preview" style="background:var(--bg); border:2px dashed var(--neon-blue);">
                <div style="text-align:center;"><h3 style="color:var(--neon-blue)">DAILY CLOSING</h3><p>${nowFormatted}</p></div>
                <hr style="margin:15px 0; border:0.5px dashed #000;">
                <div class="thermal-row"><span>New Sales (Downpay):</span><b>$${dailyDownPayments.toFixed(2)} (${downPayCount})</b></div>
                <div class="thermal-row"><span>Installments Recv:</span><b>$${installmentTotal.toFixed(2)} (${dailyInstallments.length})</b></div>
                <hr style="margin:15px 0; border:0.5px dashed #000;">
                <div class="thermal-row" style="font-size:1.4rem;"><span>CASH IN BOX:</span><b style="color:var(--success);">$${closingTotal.toFixed(2)}</b></div>
            </div>
            <button class="main-btn" onclick="printClosing()"><i class="fa-solid fa-print"></i> PRINT CLOSING</button>
        `;
        document.getElementById('modal-universal').style.display = 'flex';
        toggleMenu();
    }

    function showCashDrawer() {
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;
        let totalDown = [...sales, ...archive].reduce((acc, s) => acc + parseFloat(s.down || 0), 0);
        let totalReceived = reports.reduce((acc, r) => acc + parseFloat(r.mon || 0), 0);
        let cashInDrawer = totalDown + totalReceived;
        
        document.getElementById('modal-title').innerText = l.mvault || "Cash Drawer";
        document.getElementById('modal-content').innerHTML = `
            <div class="card" style="text-align:center; padding:30px; border:2px solid var(--success);">
                <i class="fa-solid fa-vault" style="font-size:3rem; color:var(--success); margin-bottom:15px;"></i>
                <p style="color:#64748b; font-weight:700;">TOTAL CASH ON HAND</p>
                <h1 style="font-size:3.5rem; font-weight:900; color:var(--text);">$${cashInDrawer.toFixed(2)}</h1>
                <hr style="margin:20px 0; border:0.5px dashed var(--border);">
                <div class="details-grid" style="text-align:left;">
                    <div class="rep-stat"><small>From Down Payments</small><h3>$${totalDown.toFixed(2)}</h3></div>
                    <div class="rep-stat"><small>From Installments</small><h3>$${totalReceived.toFixed(2)}</h3></div>
                </div>
            </div>
        `;
        document.getElementById('modal-universal').style.display = 'flex';
        toggleMenu();
    }

    function printClosing() { 
        const content = document.getElementById('closing-preview');
        if(!content) return;
        
        const area = document.getElementById('print-area'); 
        area.innerHTML = `<div class="print-80mm" style="padding:10px;">${content.innerHTML}</div>`; 
        setTimeout(() => { window.print(); }, 500); 
    }
    
    function toggleLayout() { 
        document.getElementById('app-container').classList.toggle('pc-mode-active'); 
        toggleMenu(); 
    }
    
    function toggleMenu() { 
        const overlay = document.getElementById('menu-overlay');
        if(overlay) overlay.classList.toggle('show'); 
    }
    
    function delInv(id) { 
        if(confirm("DELETE?")){
            inv = inv.filter(x => x.id !== id); 
            updateDB(() => {
                showToast("Item Deleted!", "danger");
                showInventory();
            });
        } 
    }

    function softDelete(id) { 
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;
        document.getElementById('modal-title').innerText = "CONFIRM";
        document.getElementById('modal-content').innerHTML = `
            <div class="confirm-box">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <p style="font-weight:900; font-size:1.1rem;">${l.confirm_del}</p>
                <div class="confirm-actions">
                    <button class="confirm-btn btn-no" onclick="closeModal()">NO</button>
                    <button class="confirm-btn btn-yes" onclick="executeSoftDelete(${id})">YES, TRASH IT</button>
                </div>
            </div>
        `;
        document.getElementById('modal-universal').style.display = 'flex';
    }

    function executeSoftDelete(id) {
        if(prompt("MASTER KEY:") !== SECRET_KEY) { 
            showToast("Access Denied!", "danger");
            return;
        }
        
        let idx = sales.findIndex(x => x.id === id);
        if(idx !== -1) {
            let saleItem = sales[idx];
            let invIdx = inv.findIndex(x => x.id == saleItem.itemId);
            let oldSales = [...sales];
            let oldTrash = [...trash];
            let oldQty = (invIdx !== -1) ? inv[invIdx].qty : null;
            
            if(invIdx !== -1) inv[invIdx].qty++; 
            trash.unshift(saleItem); 
            sales.splice(idx, 1); 
            
            updateDB((success) => { 
                if(success) {
                    showToast("Moved to Trash", "danger");
                    closeModal();
                } else { 
                    sales = oldSales; 
                    trash = oldTrash; 
                    if(invIdx !== -1) inv[invIdx].qty = oldQty; 
                    render(); 
                }
            }); 
        }
    }

    function showArchive(isRefresh = false) {
        const q = document.getElementById('search-input').value.toLowerCase();
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;
        
        let filtered = archive.filter(x => {
            return x.name.toLowerCase().includes(q) || 
                   x.item.toLowerCase().includes(q) || 
                   x.id.toString().includes(q);
        });
        
        document.getElementById('modal-title').innerText = l.marchive; 
        document.getElementById('modal-content').innerHTML = `
        <div class="table-wrap">
            <table>
                <thead><tr><th>NAME</th><th>ITEM</th><th>TOTAL</th><th>ACTION</th></tr></thead>
                <tbody>${filtered.map(x=>`<tr><td><b>${x.name}</b></td><td>${x.item}</td><td>$${parseFloat(x.total).toFixed(2)}</td><td>
                <button onclick="showLedger(${x.id})" class="btn-sm" style="background:var(--primary);"><i class="fa-solid fa-clock-rotate-left"></i></button>
                ${currentUserRole === "Admin" ? `<button onclick="editSale(${x.id})" class="btn-sm" style="background:#f59e0b;"><i class="fa-solid fa-pen-to-square"></i></button>` : ''}
                </td></tr>`).join('')}</tbody>
            </table>
        </div>`; 
        
        document.getElementById('modal-universal').style.display = 'flex'; 
        if(!isRefresh) toggleMenu(); 
    }

    function showRecycleBin(isRefresh = false) { 
        const q = document.getElementById('search-input').value.toLowerCase();
        let filtered = trash.filter(x => {
            return x.name.toLowerCase().includes(q) || 
                   x.item.toLowerCase().includes(q) || 
                   x.id.toString().includes(q);
        });
        
        document.getElementById('modal-title').innerText = "TRASH"; 
        document.getElementById('modal-content').innerHTML = `
        <div class="table-wrap">
            <table>
                <thead><tr><th>NAME</th><th>ITEM</th><th>ACTION</th></tr></thead>
                <tbody>${filtered.map((x)=>`<tr><td><b>${x.name}</b></td><td>${x.item}</td><td><button onclick="restore(${trash.indexOf(x)})" class="main-btn" style="margin-top:0; padding:8px;">RESTORE</button></td></tr>`).join('')}</tbody>
            </table>
        </div>`; 
        
        document.getElementById('modal-universal').style.display = 'flex'; 
        if(!isRefresh) toggleMenu(); 
    }
    
    function restore(idx) { 
        if(idx < 0 || idx >= trash.length) return;
        
        let restoredSale = trash[idx];
        let invIdx = inv.findIndex(x => x.id == restoredSale.itemId);
        
        if(invIdx !== -1) {
            let oldTrash = [...trash];
            let oldSales = [...sales];
            let oldQty = inv[invIdx].qty;
            
            inv[invIdx].qty--; 
            sales.unshift(restoredSale); 
            trash.splice(idx, 1); 
            
            updateDB((success) => { 
                if(success) { 
                    showToast("Restored!", "success"); 
                    closeModal(); 
                }
                else { 
                    trash = oldTrash; 
                    sales = oldSales; 
                    inv[invIdx].qty = oldQty; 
                } 
            }); 
        } else {
            showToast("Item not found in inventory!", "danger");
        }
    }

    function closeModal() { 
        isInventoryOpen = false; 
        
        // Clean up scanner if active
        if(activeScanner) {
            activeScanner.stop().then(() => {
                activeScanner = null;
                isScanning = false;
                document.getElementById('modal-universal').style.display='none';
            }).catch(() => {
                activeScanner = null;
                isScanning = false;
                document.getElementById('modal-universal').style.display='none';
            });
        } else { 
            document.getElementById('modal-universal').style.display='none'; 
        }
    }

    function exportToExcel() { 
        try {
            const wb = XLSX.utils.book_new(); 
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sales), "Sales"); 
            XLSX.writeFile(wb, "POS_Backup.xlsx"); 
            showToast("Excel Exported!", "success");
        } catch(e) {
            console.error("Excel export failed:", e);
            showToast("Export failed!", "danger");
        }
    }
    
    function exportJSON() { 
        try {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({i:inv, s:sales, a:archive, t:trash, r:reports})); 
            const dlAnchorElem = document.createElement('a'); 
            dlAnchorElem.setAttribute("href", dataStr); 
            dlAnchorElem.setAttribute("download", "POS_Backup_Full.json"); 
            document.body.appendChild(dlAnchorElem);
            dlAnchorElem.click(); 
            document.body.removeChild(dlAnchorElem);
            showToast("JSON Backup Ready!", "success");
        } catch(e) {
            console.error("JSON export failed:", e);
            showToast("Export failed!", "danger");
        }
    }

    function triggerRestore() { 
        document.getElementById('restore-input').click(); 
    }
    
    function restoreData(e) { 
        const file = e.target.files[0];
        if(!file) return;
        
        const reader = new FileReader(); 
        reader.onload = (ev) => { 
            try { 
                const d = JSON.parse(ev.target.result); 
                inv = d.i || []; 
                sales = d.s || []; 
                archive = d.a || []; 
                trash = d.t || []; 
                reports = d.r || []; 
                
                updateDB(() => {
                    const l = translations[document.getElementById('lang-sel').value] || translations.bd;
                    showToast(l.success_restore, "success");
                    setTimeout(() => location.reload(), 1500);
                });
            } catch(e) { 
                console.error("Restore failed:", e);
                showToast("Invalid File!", "danger"); 
            } 
        }; 
        reader.onerror = () => {
            showToast("Failed to read file!", "danger");
        };
        reader.readAsText(file); 
    }

    function showAbout() {
        const l = translations[document.getElementById('lang-sel').value] || translations.bd;
        document.getElementById('modal-title').innerText = l.mabout;
        document.getElementById('modal-content').innerHTML = `
            <div style="text-align:center; padding:20px;">
                <img src="https://i.postimg.cc/nV1HLXWy/EFAC45A5-C196-48E5-913E-A27706778B90.jpg" style="width:120px; border-radius:50%; border:3px solid var(--neon-blue); margin-bottom:15px;" alt="Developer">
                <h2 style="color:var(--neon-blue)">Bizhar Rasheed</h2>
                <p>${l.dev_role}</p>
                <p>${l.dev_msg}</p>
                <a href="https://bizhar-cloud.github.io/BizharRasheed/" target="_blank" rel="noopener noreferrer" class="dev-link">${l.click_visit}</a>
            </div>
        `;
        document.getElementById('modal-universal').style.display = 'flex'; 
        toggleMenu();
    }
</script>
